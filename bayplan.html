<!DOCTYPE html>

<html lang="en" data-theme="night">
<head>
<meta charset="utf-8">

<title>BAYPLAN: workshop floor planner</title>
<style>
  :root{
    --ground:#0f1720; --panel:#16212e; --panel-2:#1d2b3a;
    --ink:#e8eef2; --ink-dim:#8fa3b3; --line:#2a3a4c;
    --brass:#c9a24a; --grid:rgba(232,238,242,.06);
    --hard:#e0524a; --soft:#d8a13a; --shared:#3fa9a0;
    --footprint:#c4cfd8; --footprint-fill:rgba(196,207,216,.14);
    --dust:#b3a17d; --power:#9a7fb8; --power240:#e08a52; --air:#5fb6c9;
    --font-mono:ui-monospace,"SF Mono","Cascadia Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --font-sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  [data-theme="day"]{
    --ground:#e7eae4; --panel:#fbfcfa; --panel-2:#eef1ec;
    --ink:#17222c; --ink-dim:#586772; --line:#c8d0c9;
    --brass:#8a6d1f; --grid:rgba(23,34,44,.07);
    --hard:#c23a32; --soft:#a9761a; --shared:#1f7d74;
    --footprint:#3a4650; --footprint-fill:rgba(58,70,80,.10);
    --dust:#8a7a52; --power:#6a4f88; --power240:#b85c1e; --air:#2b7f92;
  }
  [data-theme="contrast"]{
    --ground:#000; --panel:#000; --panel-2:#0a0a0a;
    --ink:#fff; --ink-dim:#d8d8d8; --line:#ffffff;
    --brass:#ffd400; --grid:rgba(255,255,255,.16);
    --hard:#ff5b52; --soft:#ffc447; --shared:#33e0d4;
    --footprint:#ffffff; --footprint-fill:rgba(255,255,255,.10);
    --dust:#ffd9a0; --power:#c9a0ff; --power240:#ffb27f; --air:#7fe3f5;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--ground); color:var(--ink);
    font-family:var(--font-sans); font-size:15px; line-height:1.5;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  header{
    display:flex; align-items:baseline; gap:16px; flex-wrap:wrap;
    padding:12px 18px; border-bottom:1px solid var(--line); background:var(--panel);
  }
  .wordmark{font-family:var(--font-mono); font-weight:700; letter-spacing:.14em; font-size:17px}
  .fi{font-family:var(--font-mono); font-size:12px; color:var(--brass); letter-spacing:.1em}
  .tag{font-size:12px; color:var(--ink-dim); font-style:italic}
  .spacer{flex:1}
  .toolbar{display:flex; gap:8px; flex-wrap:wrap}
  button{
    font-family:var(--font-mono); font-size:12px; letter-spacing:.05em;
    color:var(--ink); background:var(--panel-2); border:1px solid var(--line);
    padding:7px 11px; border-radius:2px; cursor:pointer;
  }
  button:hover{border-color:var(--brass)}
  button:focus-visible{outline:2px solid var(--brass); outline-offset:2px}
  button:disabled{opacity:.4; cursor:default}
  button.danger:hover{border-color:var(--hard); color:var(--hard)}
  .seg{display:inline-flex; border:1px solid var(--line); border-radius:2px; overflow:hidden}
  .seg button{border:0; border-radius:0; border-left:1px solid var(--line)}
  .seg button:first-child{border-left:0}
  .seg button[aria-pressed="true"]{background:var(--brass); color:#111}
  main{flex:1; display:flex; min-height:0}
  .stage{flex:1; position:relative; overflow:hidden; touch-action:none; user-select:none; -webkit-user-select:none}
  svg{width:100%; height:100%; display:block}
  aside{
    width:288px; border-left:1px solid var(--line); background:var(--panel);
    padding:14px 16px; overflow:auto;
  }
  aside h2{font-family:var(--font-mono); font-size:11px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--ink-dim); margin:0 0 8px; font-weight:600;
    display:flex; justify-content:space-between; align-items:center}
  aside section{margin-bottom:20px}
  .count{font-family:var(--font-mono); color:var(--brass)}
  .legend-row{display:flex; align-items:center; gap:9px; margin:5px 0; font-size:12.5px}
  .sw{width:13px; height:13px; border-radius:2px; flex:none}
  .sw.hard{background:var(--hard)} .sw.soft{background:var(--soft)} .sw.shared{background:var(--shared)}
  .sw.fp{background:var(--footprint-fill); border:1px solid var(--footprint)}
  .shelf{display:flex; flex-direction:column; gap:3px; max-height:230px; overflow:auto}
  .shelf button{text-align:left; display:flex; justify-content:space-between; gap:8px; padding:6px 8px}
  .shelf .cat{font-size:9.5px; color:var(--ink-dim); align-self:center}
  .placed{list-style:none; margin:0; padding:0}
  .placed li{font-size:13px; padding:6px 8px; border:1px solid transparent; border-radius:2px;
    display:flex; justify-content:space-between; gap:8px; cursor:pointer; align-items:center}
  .placed li:hover{background:var(--panel-2)}
  .placed .meta{font-family:var(--font-mono); font-size:10px; color:var(--ink-dim)}
  .selpanel{border:1px solid var(--brass); border-radius:2px; padding:10px; background:var(--panel-2)}
  .selpanel .name{font-size:13px; margin-bottom:8px}
  .selpanel .row{display:flex; gap:6px; flex-wrap:wrap}
  .selpanel button{flex:1; min-width:56px; text-align:center}
  .empty{font-size:12.5px; color:var(--ink-dim); font-style:italic; line-height:1.5}
  .trim{font-family:var(--font-mono)}
  .trim.clear-msg{color:var(--shared); font-size:12px}
  .trim ul{list-style:none; margin:0; padding:0}
  .trim li{padding:4px 0; border-bottom:1px solid var(--line); font-size:11.5px; line-height:1.35}
  .trim .badge{font-weight:700}
  .trim .err{color:var(--hard)} .trim .warn{color:var(--soft)}
  footer{
    padding:7px 18px; border-top:1px solid var(--line); background:var(--panel);
    font-family:var(--font-mono); font-size:11px; color:var(--ink-dim);
    display:flex; gap:16px; flex-wrap:wrap; align-items:center;
  }
  footer .err{color:var(--hard)} footer .warn{color:var(--soft)} footer .ok{color:var(--shared)}
  a{color:var(--brass)}
  #tests{padding:20px 24px; overflow:auto; font-family:var(--font-mono); font-size:13px; height:100%}
  #tests h1{font-size:15px; letter-spacing:.1em}
  .t-pass{color:var(--shared)} .t-fail{color:var(--hard)}
  #tests .summary{font-size:14px; margin:12px 0 18px; padding:10px 12px; border:1px solid var(--line); border-radius:2px}
  #tests table{border-collapse:collapse; width:100%}
  #tests td{padding:3px 8px; border-bottom:1px solid var(--line); vertical-align:top}
  @media (max-width:760px){ aside{width:246px} }
  /* PLAT: compare + print */
  #compare{padding:18px 22px; overflow:auto; height:100%}
  #compare h1{font-family:var(--font-mono); font-size:15px; letter-spacing:.08em; margin:0 0 4px}
  #compare .pair{display:grid; grid-template-columns:1fr 1fr; gap:16px; margin:12px 0}
  #compare .col h3{font-family:var(--font-mono); font-size:12px; letter-spacing:.1em; margin:0 0 6px; color:var(--brass)}
  #compare .plat{border:1px solid var(--line); background:var(--panel); border-radius:2px}
  #compare .plat svg{width:100%; height:auto; display:block}
  #compare table{border-collapse:collapse; width:100%; font-family:var(--font-mono); font-size:12px; margin-top:8px}
  #compare td,#compare th{padding:5px 9px; border-bottom:1px solid var(--line); text-align:left}
  #compare th{color:var(--ink-dim); font-weight:600; letter-spacing:.06em}
  #compare .delta-add{color:var(--shared)} #compare .delta-rem{color:var(--hard)} #compare .delta-mov{color:var(--soft)}
  #printSheet{display:none}
  @media print{
    header,footer,aside,.stage,#tests,#compare{display:none !important}
    body{height:auto; overflow:visible; background:#fff}
    #printSheet{display:block; width:100%}
    #printSheet svg{width:100%; height:auto}
  }
</style>
</head>

/* ---- geometry core ---- */
const G = {
  bounds(fp){ const v=fp.vertices; let a=Infinity,b=Infinity,c=-Infinity,d=-Infinity;
    for(const[x,y]of v){if(x<a)a=x;if(y<b)b=y;if(x>c)c=x;if(y>d)d=y;} return{minX:a,minY:b,maxX:c,maxY:d};},
  rectOffEdge(b,edge,depth){switch(edge){
    case"front":return[[b.minX,b.minY-depth],[b.maxX,b.minY-depth],[b.maxX,b.minY],[b.minX,b.minY]];
    case"back":return[[b.minX,b.maxY],[b.maxX,b.maxY],[b.maxX,b.maxY+depth],[b.minX,b.maxY+depth]];
    case"left":return[[b.minX-depth,b.minY],[b.minX,b.minY],[b.minX,b.maxY],[b.minX-depth,b.maxY]];
    case"right":return[[b.maxX,b.minY],[b.maxX+depth,b.minY],[b.maxX+depth,b.maxY],[b.maxX,b.maxY]];
    default:throw new Error("edge "+edge);}},
  pointInPolygon(p,poly){let n=false;for(let i=0,j=poly.length-1;i<poly.length;j=i++){
    const xi=poly[i][0],yi=poly[i][1],xj=poly[j][0],yj=poly[j][1];
    if(((yi>p[1])!==(yj>p[1]))&&(p[0]<(xj-xi)*(p[1]-yi)/(yj-yi)+xi))n=!n;}return n;},
  _o(a,b,c){return (b[0]-a[0])*(c[1]-a[1])-(b[1]-a[1])*(c[0]-a[0]);},
  segIntersect(p1,p2,p3,p4){
    const d1=this._o(p3,p4,p1),d2=this._o(p3,p4,p2),d3=this._o(p1,p2,p3),d4=this._o(p1,p2,p4);
    return((d1>0&&d2<0)||(d1<0&&d2>0))&&((d3>0&&d4<0)||(d3<0&&d4>0));},
  polysOverlap(a,b){
    for(const v of a) if(this.pointInPolygon(v,b)) return true;
    for(const v of b) if(this.pointInPolygon(v,a)) return true;
    for(let i=0;i<a.length;i++){const a1=a[i],a2=a[(i+1)%a.length];
      for(let j=0;j<b.length;j++){const b1=b[j],b2=b[(j+1)%b.length];
        if(this.segIntersect(a1,a2,b1,b2))return true;}}
    return false;},
  bearing(cx,cy,px,py){let b=Math.atan2(px-cx,py-cy)*180/Math.PI;return(b%360+360)%360;},
  angleInSweep(b,s,w){return(((b-s)%360+360)%360)<=w+1e-9;},
  pointInArc(p,arc){const dx=p[0]-arc.center[0],dy=p[1]-arc.center[1],r=Math.hypot(dx,dy);
    if(r>arc.radius+1e-9)return false; if(arc.innerRadius!=null&&r<arc.innerRadius-1e-9)return false;
    return this.angleInSweep(this.bearing(arc.center[0],arc.center[1],p[0],p[1]),arc.startAngle,arc.sweep);},
  mirrorArc(arc){return Object.assign({},arc,{center:[-arc.center[0],arc.center[1]],
    startAngle:((360-(arc.startAngle+arc.sweep))%360+360)%360, sweep:arc.sweep});},
  toWorld(pt,pl){let x=pt[0],y=pt[1]; if(pl.mirrored)x=-x;
    const t=(pl.rotation||0)*Math.PI/180,c=Math.cos(t),s=Math.sin(t);
    return[x*c+y*s+pl.position[0], -x*s+y*c+pl.position[1]];},
  arcToWorldPoly(arc,pl,step=10){let a=pl.mirrored?this.mirrorArc(arc):arc;
    const rot=pl.rotation||0, start=((a.startAngle+rot)%360+360)%360;
    const c=this.toWorld(a.center,{position:pl.position,rotation:0,mirrored:false});
    const pts=[],inner=a.innerRadius||0;
    for(let d=0;d<=a.sweep+1e-6;d+=step){const b=(start+d)*Math.PI/180;
      pts.push([c[0]+a.radius*Math.sin(b),c[1]+a.radius*Math.cos(b)]);}
    if(inner>0){for(let d=a.sweep;d>=-1e-6;d-=step){const b=(start+d)*Math.PI/180;
      pts.push([c[0]+inner*Math.sin(b),c[1]+inner*Math.cos(b)]);}} else pts.push(c);
    return pts;},
  zoneWorldPoly(z,def,pl){ if(z.shape==="arc")return this.arcToWorldPoly(z.geometry,pl);
    const local=z.shape==="rect"?this.rectOffEdge(this.bounds({vertices:this.footprintLocal(def,pl)}),z.geometry.edge,z.geometry.depth):z.geometry.vertices;
    return local.map(p=>this.toWorld(p,pl));},
  defSize(def){const b=this.bounds(def.footprint); return [b.maxX-b.minX, b.maxY-b.minY];},
  // local footprint vertices, scaled about the anchor when the placement overrides its size
  footprintLocal(def,pl){const v=def.footprint.vertices;
    if(pl&&pl.size){const b=this.bounds(def.footprint); const dw=(b.maxX-b.minX)||1, dh=(b.maxY-b.minY)||1;
      const sx=pl.size[0]/dw, sy=pl.size[1]/dh; return v.map(p=>[p[0]*sx,p[1]*sy]);}
    return v;},
  footprintWorldPoly(def,pl){return this.footprintLocal(def,pl).map(p=>this.toWorld(p,pl));}
};

/* ---- facility feature geometry (columns, doors, windows) ---- */
const Feat = {
  columnPoly(f){const[x,y]=f.position,[w,h]=f.size; const hw=w/2,hh=h/2;
    return [[x-hw,y-hh],[x+hw,y-hh],[x+hw,y+hh],[x-hw,y+hh]];},
  doorArc(f){return {center:f.position.slice(),radius:f.width,startAngle:f.swingStart||0,sweep:f.swingSweep||90};},
  doorSwingPoly(f){const a=this.doorArc(f); const pts=[]; const step=10;
    for(let d=0;d<=a.sweep+1e-6;d+=step){const b=(a.startAngle+d)*Math.PI/180;
      pts.push([a.center[0]+a.radius*Math.sin(b),a.center[1]+a.radius*Math.cos(b)]);}
    pts.push(a.center.slice()); return pts;},
  doorLeafEnd(f){const a=this.doorArc(f); const b=(a.startAngle)*Math.PI/180;
    return [a.center[0]+a.radius*Math.sin(b),a.center[1]+a.radius*Math.cos(b)];},
  windowSeg(f){const[x,y]=f.position; const b=((f.facing||0))*Math.PI/180; // segment lies along the wall bearing
    const hw=f.width/2, dx=Math.sin(b)*hw, dy=Math.cos(b)*hw;
    return [[x-dx,y-dy],[x+dx,y+dy]];},
  // nearest boundary edge to a point, with the closest point on that edge
  closestOnSeg(p,a,b){const abx=b[0]-a[0],aby=b[1]-a[1]; const L=abx*abx+aby*aby||1;
    const t=Math.max(0,Math.min(1,((p[0]-a[0])*abx+(p[1]-a[1])*aby)/L));
    return [a[0]+abx*t,a[1]+aby*t];},
  nearestWall(boundary,p){let best=null,bd=Infinity; const V=boundary.vertices;
    for(let i=0;i<V.length;i++){const a=V[i],b=V[(i+1)%V.length]; const c=this.closestOnSeg(p,a,b);
      const d=Math.hypot(c[0]-p[0],c[1]-p[1]); if(d<bd){bd=d; best={i,point:c,a,b,dist:d};}}
    return best;},
  // snap a door/window onto the nearest wall within thresh; returns null if too far
  wallSnap(boundary,pos,kind,thresh=30){const w=this.nearestWall(boundary,pos); if(!w||w.dist>thresh)return null;
    const dx=w.b[0]-w.a[0], dy=w.b[1]-w.a[1]; const edgeBear=Math.atan2(dx,dy)*180/Math.PI;
    const res={position:[Math.round(w.point[0]),Math.round(w.point[1])]};
    if(kind==="window"){res.facing=edgeBear;}
    else if(kind==="door"){
      const inward=(bear)=>{const r=bear*Math.PI/180;
        return G.pointInPolygon([w.point[0]+Math.sin(r)*4,w.point[1]+Math.cos(r)*4],boundary.vertices);};
      res.swingStart = inward(edgeBear+90) ? edgeBear : edgeBear-90;
      res.swingSweep = 90;
    }
    return res;}
};

/* ---- TRIM: conflict severity matrix + checker ---- */
const Trim = {
  interaction(a,b){
    const k=[a,b].sort().join("|");
    const M={
      "footprint|footprint":"error",
      "footprint|hard":"error",
      "footprint|soft":"warning",
      "footprint|shared":"warning",
      "hard|hard":"error",
      "hard|shared":"error",
      "hard|soft":"warning",
      "shared|soft":"ok",
      "shared|shared":"ok",
      "soft|soft":"warning",
    };
    return M[k]||"ok";
  },
  // each region carries a vertical band [lo,hi]: a machine body is floor-to-height;
  // a clearance zone is protected from its minHeight up to the ceiling (null minHeight = floor).
  regions(pl,ceiling){
    const def=Model.def(pl.defId); if(!def) return [];
    const bodyHi = (def.height!=null)?def.height:Infinity;
    const out=[{kind:"footprint",label:"body",poly:G.footprintWorldPoly(def,pl),lo:0,hi:bodyHi}];
    for(const z of def.clearances)
      out.push({kind:z.severity,label:z.label,poly:G.zoneWorldPoly(z,def,pl),
        lo:(z.minHeight!=null?z.minHeight:0), hi:ceiling});
    return out;
  },
  vOverlap(a,b){return a.lo < b.hi - 1e-9 && b.lo < a.hi - 1e-9;},
  featureRegions(doc,ceiling){
    const out=[];
    for(const f of (doc.facility.features||[])){
      if(f.kind==="column") out.push({kind:"footprint",label:"column",
        poly:Feat.columnPoly(f),lo:0,hi:(f.height!=null?f.height:ceiling),fid:f.id,fname:"column"});
      else if(f.kind==="door") out.push({kind:"hard",label:"door swing",
        poly:Feat.doorSwingPoly(f),lo:0,hi:ceiling,fid:f.id,fname:"door swing"});
      // windows do not constrain placement
    }
    return out;
  },
  rank(s){return s==="error"?2:s==="warning"?1:0;},
  compute(doc){
    const sc=doc.scenarios.find(s=>s.id===doc.activeScenarioId);
    const ceiling=(doc.facility.ceilingHeight!=null?doc.facility.ceilingHeight:108);
    const pls=sc.placements, recs=[], worst={};
    const bump=(id,s)=>{ if(this.rank(s)>this.rank(worst[id]||"ok")) worst[id]=s; };
    for(let i=0;i<pls.length;i++){
      const rgA=this.regions(pls[i],ceiling); const dA=Model.def(pls[i].defId);
      const nameA=pls[i].label||(dA&&dA.name)||"?";
      for(let j=i+1;j<pls.length;j++){
        const rgB=this.regions(pls[j],ceiling); const dB=Model.def(pls[j].defId);
        const nameB=pls[j].label||(dB&&dB.name)||"?";
        let pairWorst="ok", detail=null;
        for(const ra of rgA) for(const rb of rgB){
          const sev=this.interaction(ra.kind,rb.kind);
          if(sev==="ok") continue;
          if(this.rank(sev)>this.rank(pairWorst) && this.vOverlap(ra,rb) && G.polysOverlap(ra.poly,rb.poly)){
            pairWorst=sev; detail={la:ra.label,lb:rb.label};
          }
        }
        if(pairWorst!=="ok"){
          recs.push({sev:pairWorst,a:pls[i].id,b:pls[j].id,
            text:`${nameA} ${detail.la} \u00d7 ${nameB} ${detail.lb}`});
          bump(pls[i].id,pairWorst); bump(pls[j].id,pairWorst);
        }
      }
    }
    const fb=doc.facility.boundary.vertices;
    for(const pl of pls){
      const def=Model.def(pl.defId); if(!def) continue;
      const fp=G.footprintWorldPoly(def,pl);
      if(fp.some(v=>!G.pointInPolygon(v,fb))){
        recs.push({sev:"error",a:pl.id,b:"facility",
          text:`${pl.label||def.name} extends past the walls`});
        bump(pl.id,"error");
      }
    }
    // features: columns (solid) and door swings (hard) constrain placement
    const feats=this.featureRegions(doc,ceiling);
    for(const pl of pls){
      const def=Model.def(pl.defId); if(!def) continue;
      const rg=this.regions(pl,ceiling); const nm=pl.label||def.name;
      const perFeature={};
      for(const ra of rg) for(const fr of feats){
        const sev=this.interaction(ra.kind,fr.kind);
        if(sev==="ok") continue;
        if(this.rank(sev)>this.rank(perFeature[fr.fid]?.sev||"ok") && this.vOverlap(ra,fr) && G.polysOverlap(ra.poly,fr.poly))
          perFeature[fr.fid]={sev,la:ra.label,fname:fr.fname};
      }
      for(const fid in perFeature){const p=perFeature[fid];
        recs.push({sev:p.sev,a:pl.id,b:fid,text:`${nm} ${p.la} \u00d7 ${p.fname}`});
        bump(pl.id,p.sev);
      }
    }
    const errors=recs.filter(r=>r.sev==="error").length;
    const warnings=recs.filter(r=>r.sev==="warning").length;
    return {records:recs,worst,errors,warnings};
  }
};

/* ---- document model ---- */
const Model = {
  library(){return SEED.library;},
  def(id){return SEED.library.find(m=>m.id===id);},
  _seq:100,
  newId(){return "p"+(++this._seq);},
  emptyFacility(){return {schemaVersion:"1.0.0",
    meta:{title:"Untitled",units:"imperial",gridSpacing:12,revision:"A",author:"M.B. Parks",date:null},
    facility:{id:"f1",name:"Shop",boundary:{vertices:[[0,0],[288,0],[288,216],[0,216]]},
      ceilingHeight:108,northOffset:0,features:[]},
    library:SEED.library,
    scenarios:[{id:"s1",name:"Current",placements:[],utilityNodes:[],utilityRuns:[],flows:[],annotations:[],notes:""}],
    activeScenarioId:"s1"};},
  _sseq:1, newScenarioId(){return "s"+(++this._sseq);},
  duplicateScenario(doc){const sc=doc.scenarios.find(s=>s.id===doc.activeScenarioId);
    const clone=JSON.parse(JSON.stringify(sc)); // placement ids kept for compare matching
    clone.id=this.newScenarioId(); clone.name=sc.name==="Current"?"Proposed":sc.name+" copy";
    doc.scenarios.push(clone); doc.activeScenarioId=clone.id; return clone;},
  setActiveScenario(doc,id){if(doc.scenarios.some(s=>s.id===id))doc.activeScenarioId=id;},
  removeScenario(doc,id){if(doc.scenarios.length<=1)return;
    doc.scenarios=doc.scenarios.filter(s=>s.id!==id);
    if(doc.activeScenarioId===id)doc.activeScenarioId=doc.scenarios[0].id;},
  demo(){const d=this.emptyFacility(); d.meta.title="Demo shop"; d.facility.name="Two-bay shop";
    d.scenarios[0].placements=[
      {id:"p1",defId:"builtin-table-saw-cabinet",position:[96,120],rotation:0,mirrored:false,label:"Table saw"},
      {id:"p2",defId:"builtin-jointer-8in",position:[150,60],rotation:0,mirrored:false,label:"Jointer"},
      {id:"p3",defId:"builtin-wood-lathe",position:[214,158],rotation:0,mirrored:false,label:"Lathe"}
    ]; return d;},
  add(doc,defId){const def=this.def(defId); const sc=doc.scenarios.find(s=>s.id===doc.activeScenarioId);
    const fb=G.bounds(doc.facility.boundary); const cx=(fb.minX+fb.maxX)/2, cy=(fb.minY+fb.maxY)/2;
    const pl={id:this.newId(),defId,position:[Math.round(cx),Math.round(cy)],rotation:0,mirrored:false,
      locked:false,label:def.name.replace(/\s*\(.*$/,"")};
    sc.placements.push(pl); return pl;},
  _fseq:0, newFlowId(){return "fl"+(++this._fseq);},
  FLOW_COLORS:["#6ea8ff","#b48ead","#e06c9f","#5fc9c2","#c9a24a","#8fbf6a"],
  addFlow(doc){const sc=doc.scenarios.find(s=>s.id===doc.activeScenarioId);
    const n=sc.flows.length;
    const fl={id:this.newFlowId(),name:"Flow "+(n+1),stockType:"",waypoints:[],
      color:this.FLOW_COLORS[n%this.FLOW_COLORS.length]};
    sc.flows.push(fl); return fl;},
  removeFlow(doc,id){const sc=doc.scenarios.find(s=>s.id===doc.activeScenarioId);
    sc.flows=sc.flows.filter(f=>f.id!==id);},
  _nseq:0, newNodeId(){return "n"+(++this._nseq);},
  addNode(doc,kind){const sc=doc.scenarios.find(s=>s.id===doc.activeScenarioId);
    const fb=G.bounds(doc.facility.boundary);
    const nrec=sc.utilityNodes.filter(n=>n.kind==="receptacle").length;
    const nlt=sc.utilityNodes.filter(n=>n.kind==="light").length;
    const pos=kind==="dust_collector"?[Math.round(fb.maxX-24),Math.round(fb.minY+24)]
             :kind==="compressor"?[Math.round(fb.maxX-24),Math.round(fb.maxY-24)]
             :kind==="receptacle"?[Math.round(fb.minX+6),Math.round(fb.minY+30+nrec*18)]
             :kind==="light"?[Math.round((fb.minX+fb.maxX)/2+(nlt%3-1)*40),Math.round((fb.minY+fb.maxY)/2+Math.floor(nlt/3)*40)]
             :[Math.round(fb.minX+18),Math.round(fb.minY+18)];
    const spec=kind==="dust_collector"?{cfm:1200,staticPressure:10,voltage:240,amps:15,dedicated:true}
             :kind==="panel"?{voltage:240,mainAmps:100,spaces:20}
             :kind==="compressor"?{scfm:14,psi:135,voltage:240,amps:20,dedicated:true}
             :kind==="receptacle"?{voltage:120,amps:20}
             :kind==="light"?{watts:40,voltage:120}:{};
    const node={id:this.newNodeId(),kind,position:pos,spec,
      label:kind==="dust_collector"?"Collector":kind==="panel"?"Panel":kind==="compressor"?"Air":kind==="receptacle"?"Outlet":kind==="light"?"Light":kind};
    sc.utilityNodes.push(node); return node;},
  removeNode(doc,id){const sc=doc.scenarios.find(s=>s.id===doc.activeScenarioId);
    sc.utilityNodes=sc.utilityNodes.filter(n=>n.id!==id);
    sc.utilityRuns=sc.utilityRuns.filter(r=>r.fromNode!==id);},
  // SOUNDING: boundary + features (features live on the shared facility)
  setFacilityRect(doc,w,h){w=Math.max(48,Math.round(w)); h=Math.max(48,Math.round(h));
    doc.facility.boundary.vertices=[[0,0],[w,0],[w,h],[0,h]];},
  setBoundary(doc,verts){if(verts&&verts.length>=3)
    doc.facility.boundary.vertices=verts.map(v=>[Math.round(v[0]),Math.round(v[1])]);},
  addBoundaryCorner(doc){const v=doc.facility.boundary.vertices;
    let li=0,ld=-1; for(let i=0;i<v.length;i++){const a=v[i],b=v[(i+1)%v.length];
      const d=Math.hypot(b[0]-a[0],b[1]-a[1]); if(d>ld){ld=d;li=i;}}
    const a=v[li],b=v[(li+1)%v.length];
    v.splice(li+1,0,[Math.round((a[0]+b[0])/2),Math.round((a[1]+b[1])/2)]); return li+1;},
  removeBoundaryCorner(doc,i){const v=doc.facility.boundary.vertices;
    if(v.length<=3||i==null)return; v.splice(i,1);},
  _ftseq:0, newFeatureId(){return "ft"+(++this._ftseq);},
  addFeature(doc,kind){const fb=G.bounds(doc.facility.boundary);
    const cx=Math.round((fb.minX+fb.maxX)/2),cy=Math.round((fb.minY+fb.maxY)/2);
    const f={id:this.newFeatureId(),kind};
    if(kind==="column"){f.position=[cx,cy]; f.size=[8,8]; f.height=null;}
    else if(kind==="door"){f.position=[cx,cy]; f.width=32; f.swingStart=0; f.swingSweep=90;}
    else {f.position=[cx,cy]; f.width=36; f.facing=0;}
    doc.facility.features.push(f); return f;},
  removeFeature(doc,id){doc.facility.features=doc.facility.features.filter(f=>f.id!==id);},
  export(doc){const out=Object.assign({},doc); delete out.library; // library is the built-in seed, reattached on load
    const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=(doc.meta.title||"bayplan").replace(/\s+/g,"-").toLowerCase()+".bayplan.json";
    a.click(); URL.revokeObjectURL(a.href);},
  import(file){return file.text().then(t=>{const d=JSON.parse(t);
    if(!d.facility||!Array.isArray(d.scenarios))throw new Error("Not a BAYPLAN document.");
    d.meta=d.meta||{};
    for(const s of d.scenarios){ s.placements=s.placements||[]; s.flows=s.flows||[];
      s.utilityNodes=s.utilityNodes||[]; s.utilityRuns=s.utilityRuns||[]; s.annotations=s.annotations||[]; }
    d.library=SEED.library; return d;});}
};

/* ---- ROUTING: flow waypoints + derived metrics ---- */
const Flow = {
  scenario(doc){return doc.scenarios.find(s=>s.id===doc.activeScenarioId);},
  placement(doc,id){return this.scenario(doc).placements.find(p=>p.id===id);},
  // world point of a waypoint: a free bend point, else a machine port (or its anchor)
  wpWorld(doc,wp){
    if(wp.bend) return wp.bend.slice();
    const pl=this.placement(doc,wp.placementId); if(!pl)return null;
    const def=Model.def(pl.defId); if(!def)return null;
    if(wp.portId){ const port=(def.ports||[]).find(p=>p.id===wp.portId);
      if(port) return G.toWorld(port.position,pl); }
    return pl.position.slice();
  },
  // pick the nearest port on a placement to a world point; null if the def has none
  nearestPort(doc,pl,world){
    const def=Model.def(pl.defId); const ports=def.ports||[];
    if(!ports.length) return null;
    let best=null,bd=Infinity;
    for(const p of ports){const w=G.toWorld(p.position,pl);
      const d=Math.hypot(w[0]-world[0],w[1]-world[1]); if(d<bd){bd=d;best=p;}}
    return best?best.id:null;
  },
  points(doc,flow){return flow.waypoints.map(wp=>this.wpWorld(doc,wp)).filter(Boolean);},
  segments(pts){const segs=[]; for(let i=0;i<pts.length-1;i++)segs.push([pts[i],pts[i+1]]); return segs;},
  metrics(doc,flow){
    const pts=this.points(doc,flow); const segs=this.segments(pts);
    let dist=0; for(const s of segs) dist+=Math.hypot(s[1][0]-s[0][0],s[1][1]-s[0][1]);
    let back=0, looped=false;
    if(pts.length>=2){
      const ov=[pts[pts.length-1][0]-pts[0][0], pts[pts.length-1][1]-pts[0][1]];
      const ovm=Math.hypot(ov[0],ov[1]);
      // open flow (clear net direction): a leg that projects backward onto start->end is a backtrack
      if(ovm >= 0.15*dist && ovm>1e-6){
        for(const s of segs){const v=[s[1][0]-s[0][0],s[1][1]-s[0][1]];
          if((v[0]*ov[0]+v[1]*ov[1])/ovm < -1e-6) back++;}
      } else {
        // loop or near-loop: no net direction, so count reversals (turns past 90 degrees)
        looped=true;
        const dirs=segs.map(s=>{const v=[s[1][0]-s[0][0],s[1][1]-s[0][1]]; const m=Math.hypot(v[0],v[1])||1; return [v[0]/m,v[1]/m];});
        for(let i=1;i<dirs.length;i++) if(dirs[i][0]*dirs[i-1][0]+dirs[i][1]*dirs[i-1][1] < -1e-6) back++;
        // closed loop: also weigh the wrap-around turn from the last leg into the first
        const closed = pts.length>=3 && Math.hypot(ov[0],ov[1]) < 6;
        if(closed && dirs.length>=2 && (dirs[0][0]*dirs[dirs.length-1][0]+dirs[0][1]*dirs[dirs.length-1][1] < -1e-6)) back++;
      }
    }
    return {distanceIn:dist, feet:dist/12, backtracks:back, looped, legs:segs.length, points:pts};
  },
  // crossings: segment intersections between different flows in the active scenario
  crossings(doc){
    const sc=this.scenario(doc); let count=0;
    const all=sc.flows.map(f=>({id:f.id,segs:this.segments(this.points(doc,f))}));
    for(let i=0;i<all.length;i++) for(let j=i+1;j<all.length;j++)
      for(const a of all[i].segs) for(const b of all[j].segs)
        if(G.segIntersect(a[0],a[1],b[0],b[1])) count++;
    return count;
  }
};

/* ---- SERVICES: utilities graph (electrical + dust) ---- */
const Services = {
  // equivalent length (feet of straight duct) for one 90-degree elbow, by diameter (in)
  ELBOW_90_FT:{2.5:4, 4:6, 5:7, 6:9},
  // recommended max effective run length (ft) before airflow suffers, by diameter (in)
  MAX_EFFECTIVE_FT:{2.5:20, 4:35, 5:45, 6:55},
  elbow90(d){const t=this.ELBOW_90_FT; if(t[d]!=null)return t[d];
    const ks=Object.keys(t).map(Number).sort((a,b)=>a-b);
    let k=ks[0]; for(const x of ks) if(x<=d)k=x; return t[k];},
  maxEffective(d){const t=this.MAX_EFFECTIVE_FT; if(t[d]!=null)return t[d];
    const ks=Object.keys(t).map(Number).sort((a,b)=>a-b);
    let k=ks[0]; for(const x of ks) if(x<=d)k=x; return t[k];},
  scenario(doc){return doc.scenarios.find(s=>s.id===doc.activeScenarioId);},
  node(doc,id){return this.scenario(doc).utilityNodes.find(n=>n.id===id);},
  machinePort(doc,pl,portLabel){const def=Model.def(pl.defId);
    const sc=(p)=>{ if(!pl.size)return p; const b=G.bounds(def.footprint); const dw=(b.maxX-b.minX)||1,dh=(b.maxY-b.minY)||1;
      return [p[0]*pl.size[0]/dw, p[1]*pl.size[1]/dh];};
    if(portLabel==="dust"&&def.dustPort) return G.toWorld(sc(def.dustPort.position),pl);
    if(portLabel==="air"&&def.airPort) return G.toWorld(sc(def.airPort.position),pl);
    return pl.position.slice();},
  // derive a run's polyline: manual waypoints if present (any system), else dust/air route an L, electrical straight
  routePolyline(doc,run){
    const n=this.node(doc,run.fromNode); if(!n)return[];
    const a=n.position.slice(); let b;
    if(run.toNodeId){const tn=this.node(doc,run.toNodeId); if(!tn)return[]; b=tn.position.slice();}
    else {const pl=this.scenario(doc).placements.find(p=>p.id===run.toPlacementId); if(!pl)return[];
      const routed=(run.system==="dust"||run.system==="air");
      b=routed?this.machinePort(doc,pl,run.system):pl.position.slice();}
    if(run.waypoints && run.waypoints.length) return [a, ...run.waypoints.map(w=>w.slice()), b];
    if((run.system==="dust"||run.system==="air") && Math.abs(a[0]-b[0])>1e-6 && Math.abs(a[1]-b[1])>1e-6)
      return [a,[b[0],a[1]],b]; // auto L, one elbow
    return [a,b];
  },
  polylineLenFt(poly){let d=0; for(let i=0;i<poly.length-1;i++)
    d+=Math.hypot(poly[i+1][0]-poly[i][0],poly[i+1][1]-poly[i][1]); return d/12;},
  // deflection angle (deg) at each interior vertex -> summed elbow-equivalent feet
  elbowEquivFt(poly,dia){let ft=0;
    for(let i=1;i<poly.length-1;i++){
      const v1=[poly[i][0]-poly[i-1][0],poly[i][1]-poly[i-1][1]];
      const v2=[poly[i+1][0]-poly[i][0],poly[i+1][1]-poly[i][1]];
      const m1=Math.hypot(v1[0],v1[1]),m2=Math.hypot(v2[0],v2[1]); if(m1<1e-6||m2<1e-6)continue;
      let cos=(v1[0]*v2[0]+v1[1]*v2[1])/(m1*m2); cos=Math.max(-1,Math.min(1,cos));
      const turn=Math.acos(cos)*180/Math.PI; // deflection from straight
      ft += this.elbow90(dia)*(turn/90);
    }
    return ft;},
  dustRunReport(doc,run){
    const poly=this.routePolyline(doc,run); const dia=run.spec.diameter||4;
    const straight=this.polylineLenFt(poly); const elbow=this.elbowEquivFt(poly,dia);
    const eff=straight+elbow; const max=this.maxEffective(dia);
    return {straightFt:straight, elbowFt:elbow, effectiveFt:eff, maxFt:max, over:eff>max, diameter:dia};
  },
  // duct cross-section area (sq ft) for diameter d (in)
  ductAreaFt2(d){const r=d/24; return Math.PI*r*r;}, // d/2 inches = d/24 ft radius
  // target capture airflow (cfm): design branch velocity of 4000 fpm keeps chips airborne
  targetCfm(d){return Math.round(4000*this.ductAreaFt2(d));},
  // system static pressure (in w.g.) for airflow Q through this run's duct (Darcy-style empirical fit, smooth metal)
  systemSP(effFt,d,Q){ if(Q<=0)return 0;
    return (effFt/100) * 0.109136 * Math.pow(Q,1.9) / Math.pow(d,5.02); },
  // operating point: intersect the collector's linear fan curve with the system curve (bisection)
  dustRunSP(doc,run){
    const rep=this.dustRunReport(doc,run); const d=rep.diameter; const eff=rep.effectiveFt;
    const coll=this.node(doc,run.fromNode);
    const Qmax=(coll&&coll.spec.cfm)||1200; const SPmax=(coll&&coll.spec.staticPressure)||10;
    const fan=Q=>SPmax*(1-Q/Qmax); // linear fan curve, shutoff at SPmax, free air at Qmax
    const sys=Q=>this.systemSP(eff,d,Q);
    let lo=0, hi=Qmax; // fan(lo)>sys(lo)=0, fan(hi)=0<sys(hi): unique crossing
    for(let i=0;i<50;i++){const mid=(lo+hi)/2; if(fan(mid)-sys(mid)>0)lo=mid; else hi=mid;}
    const Qop=(lo+hi)/2; const target=this.targetCfm(d);
    return {deliveredCfm:Qop, targetCfm:target, under:Qop<target, spAtOp:sys(Qop),
      effectiveFt:eff, diameter:d, ratio:target>0?Qop/target:1};
  },
  // one-click wiring: connect every machine to its nearest collector (dust), panel (electrical), and compressor (air)
  wireAll(doc){
    const sc=this.scenario(doc);
    const collectors=sc.utilityNodes.filter(n=>n.kind==="dust_collector");
    const panels=sc.utilityNodes.filter(n=>n.kind==="panel");
    const compressors=sc.utilityNodes.filter(n=>n.kind==="compressor");
    sc.utilityRuns=[]; let rid=0;
    const nearest=(nodes,pos)=>{let best=null,bd=Infinity;
      for(const n of nodes){const d=Math.hypot(n.position[0]-pos[0],n.position[1]-pos[1]);
        if(d<bd){bd=d;best=n;}} return best;};
    for(const pl of sc.placements){const def=Model.def(pl.defId); if(!def)continue;
      if(def.dustPort && collectors.length){const c=nearest(collectors,pl.position);
        sc.utilityRuns.push({id:"r"+(++rid),system:"dust",fromNode:c.id,toPlacementId:pl.id,
          spec:{diameter:def.dustPort.diameter}});}
      if(def.power && panels.length){const p=nearest(panels,pl.position);
        sc.utilityRuns.push({id:"r"+(++rid),system:"electrical",fromNode:p.id,toPlacementId:pl.id,
          spec:{voltage:def.power.voltage,amps:def.power.amps,dedicated:!!def.power.dedicated}});}
      if(def.airPort && compressors.length){const c=nearest(compressors,pl.position);
        sc.utilityRuns.push({id:"r"+(++rid),system:"air",fromNode:c.id,toPlacementId:pl.id,
          spec:{cfm:def.airPort.cfm,psi:def.airPort.psi}});}
    }
    // receptacles: each outlet runs to the nearest panel
    if(panels.length){for(const nd of sc.utilityNodes.filter(n=>n.kind==="receptacle")){
      const p=nearest(panels,nd.position);
      sc.utilityRuns.push({id:"r"+(++rid),system:"electrical",fromNode:p.id,toNodeId:nd.id,
        spec:{voltage:nd.spec.voltage||120,amps:nd.spec.amps||20,receptacle:true}});}
    // powered service nodes (collector, compressor) each pull a dedicated circuit
    for(const nd of sc.utilityNodes.filter(n=>(n.kind==="dust_collector"||n.kind==="compressor")&&n.spec&&n.spec.amps)){
      const p=nearest(panels,nd.position);
      sc.utilityRuns.push({id:"r"+(++rid),system:"electrical",fromNode:p.id,toNodeId:nd.id,
        spec:{voltage:nd.spec.voltage||240,amps:nd.spec.amps,dedicated:true}});}
    // light fixtures share lighting circuits
    for(const nd of sc.utilityNodes.filter(n=>n.kind==="light")){
      const p=nearest(panels,nd.position);
      sc.utilityRuns.push({id:"r"+(++rid),system:"electrical",fromNode:p.id,toNodeId:nd.id,
        spec:{voltage:nd.spec.voltage||120,watts:nd.spec.watts||40,light:true}});}}
    this.assignCircuits(doc);
  },
  clearRuns(doc){this.scenario(doc).utilityRuns=[];},
  STD_BREAKERS:[15,20,30,40,50,60],
  RECEPT_VA:180, // NEC 220.14(I) general receptacle load
  standardBreaker(amps){for(const b of this.STD_BREAKERS) if(b>=amps) return b; return Math.ceil(amps/10)*10;},
  // design (connected) load an electrical run puts on its circuit
  loadOf(r){const v=r.spec.voltage||120, a=r.spec.amps||0;
    if(r.spec.light) return (r.spec.watts||0)/v; // luminaire connected load from wattage
    if(r.spec.receptacle){ if(v>=240||a>=30) return a; return this.RECEPT_VA/v; } // general receptacle: 180VA
    return a;},
  isDedicatedRun(r){const v=r.spec.voltage||120,a=r.spec.amps||0;
    if(r.spec.light) return false; // lights share a lighting circuit
    if(r.spec.receptacle) return (v>=240||a>=30); // large/240V outlets get their own circuit
    return !!r.spec.dedicated;},
  // assign each electrical run to a circuit per NEC: dedicated loads get their own breaker;
  // general receptacles and shared machines pack a breaker of matching voltage under 80% of its rating
  assignCircuits(doc){
    const sc=this.scenario(doc);
    const panels=sc.utilityNodes.filter(n=>n.kind==="panel");
    for(const p of panels){ p.spec.circuits=[]; }
    let cseq=0; const letter=i=>String.fromCharCode(65+(i%26))+(i>=26?Math.floor(i/26):"");
    for(const p of panels){
      const runs=(sc.utilityRuns||[]).filter(r=>r.system==="electrical"&&r.fromNode===p.id);
      for(const r of runs) r.spec.loadAmps=this.loadOf(r);
      // dedicated first, so shared circuits pack the leftovers
      runs.sort((a,b)=>(this.isDedicatedRun(b)?1:0)-(this.isDedicatedRun(a)?1:0));
      for(const r of runs){const v=r.spec.voltage||120, a=r.spec.amps||0, load=r.spec.loadAmps;
        const kind=r.spec.light?"light":r.spec.receptacle?"receptacle":"machine";
        if(this.isDedicatedRun(r)){
          const br=r.spec.receptacle?this.standardBreaker(a):this.standardBreaker(Math.ceil(a/0.8));
          const c={id:"ck"+(++cseq),label:letter(p.spec.circuits.length),amps:br,voltage:v,dedicated:true,kind};
          p.spec.circuits.push(c); r.circuitId=c.id;
        } else {
          const wantBr=r.spec.light?15:r.spec.receptacle?(a||20):(v>=240?30:20);
          let c=p.spec.circuits.find(ci=>!ci.dedicated&&ci.voltage===v&&ci.amps===wantBr&&ci.kind===kind&&
            (this._circuitLoad(sc,p,ci.id)+load) <= 0.8*ci.amps);
          if(!c){c={id:"ck"+(++cseq),label:letter(p.spec.circuits.length),amps:wantBr,voltage:v,dedicated:false,kind};
            p.spec.circuits.push(c);}
          r.circuitId=c.id;
        }
      }
    }
  },
  _circuitLoad(sc,panel,circuitId){return (sc.utilityRuns||[])
    .filter(r=>r.system==="electrical"&&r.fromNode===panel.id&&r.circuitId===circuitId)
    .reduce((t,r)=>t+(r.spec.loadAmps!=null?r.spec.loadAmps:(r.spec.amps||0)),0);},
  circuitReport(doc,panel){return (panel.spec.circuits||[]).map(c=>{
    const load=this._circuitLoad(this.scenario(doc),panel,c.id);
    return {id:c.id,label:c.label,amps:c.amps,voltage:c.voltage,dedicated:c.dedicated,kind:c.kind,
      load, over:load>c.amps, hot:load>0.8*c.amps};});},
  // manual override: move a run onto a chosen circuit (or a new one)
  assignRunCircuit(doc,runId,circuitId){const sc=this.scenario(doc);
    const r=(sc.utilityRuns||[]).find(x=>x.id===runId); if(r)r.circuitId=circuitId;},
  // copper conductor gauge (AWG) for a branch breaker, NEC 60/75C copper
  WIRE_GAUGE:{15:"14",20:"12",30:"10",40:"8",50:"6",60:"4"},
  gaugeForBreaker(a){const t=this.WIRE_GAUGE; if(t[a])return t[a];
    const ks=Object.keys(t).map(Number).sort((x,y)=>x-y); let g=t[ks[ks.length-1]];
    for(const k of ks){ if(a<=k){g=t[k]; break;} } return g;},
  // materials takeoff (shopping list) for the active scenario
  takeoff(doc){
    const sc=this.scenario(doc); const runs=sc.utilityRuns||[]; const nodes=sc.utilityNodes||[];
    const elbowsOf=poly=>Math.max(0,poly.length-2);
    // outlets by type
    const outMap={}; for(const n of nodes.filter(n=>n.kind==="receptacle")){const k=(n.spec.voltage||120)+"|"+(n.spec.amps||20); outMap[k]=(outMap[k]||0)+1;}
    const outlets=Object.entries(outMap).map(([k,count])=>{const p=k.split("|").map(Number); return {voltage:p[0],amps:p[1],count};})
      .sort((a,b)=>a.voltage-b.voltage||a.amps-b.amps);
    // light fixtures by wattage
    const ltMap={}; for(const n of nodes.filter(n=>n.kind==="light")){const k=(n.spec.watts||40)+"|"+(n.spec.voltage||120); ltMap[k]=(ltMap[k]||0)+1;}
    const lights=Object.entries(ltMap).map(([k,count])=>{const p=k.split("|").map(Number); return {watts:p[0],voltage:p[1],count};})
      .sort((a,b)=>a.watts-b.watts);
    // panel circuit lookup
    const panels=nodes.filter(n=>n.kind==="panel");
    const ckById={}; for(const p of panels) for(const c of (p.spec.circuits||[])) ckById[c.id]=c;
    // copper cable by gauge (run feet, with a slack allowance)
    const wireMap={}; const elec=runs.filter(r=>r.system==="electrical");
    for(const r of elec){const ft=this.polylineLenFt(this.routePolyline(doc,r));
      const c=ckById[r.circuitId]; const amps=c?c.amps:(r.spec.amps||20);
      const g=this.gaugeForBreaker(amps); wireMap[g]=(wireMap[g]||0)+ft;}
    const wireByGauge=Object.entries(wireMap).map(([gauge,ft])=>({gauge,ft,buyFt:Math.ceil(ft*1.15/5)*5}))
      .sort((a,b)=>a.gauge-b.gauge); // finer (smaller wire, higher AWG) first
    // breakers by size/pole
    const brMap={}; for(const p of panels) for(const c of (p.spec.circuits||[])){const k=c.amps+"|"+(c.voltage>=240?"2":"1"); brMap[k]=(brMap[k]||0)+1;}
    const breakers=Object.entries(brMap).map(([k,count])=>{const p=k.split("|"); return {amps:+p[0],pole:p[1]==="2"?"double":"single",count};})
      .sort((a,b)=>a.amps-b.amps);
    // duct by diameter, with elbow and blast-gate counts
    const dMap={}; for(const r of runs.filter(r=>r.system==="dust")){const poly=this.routePolyline(doc,r); const dia=r.spec.diameter||4;
      if(!dMap[dia])dMap[dia]={diameter:dia,ft:0,elbows:0,gates:0};
      dMap[dia].ft+=this.polylineLenFt(poly); dMap[dia].elbows+=elbowsOf(poly); dMap[dia].gates+=1;}
    const duct=Object.values(dMap).sort((a,b)=>a.diameter-b.diameter);
    // compressed air line
    const airRuns=runs.filter(r=>r.system==="air"); let airFt=0, airElbows=0;
    for(const r of airRuns){const poly=this.routePolyline(doc,r); airFt+=this.polylineLenFt(poly); airElbows+=elbowsOf(poly);}
    // fixed equipment
    const equipment=[["Load center / panel","panel"],["Dust collector","dust_collector"],["Air compressor","compressor"]]
      .map(pair=>({item:pair[0],count:nodes.filter(n=>n.kind===pair[1]).length})).filter(e=>e.count>0);
    return {outlets,lights,wireByGauge,breakers,duct,airFt,airRuns:airRuns.length,airElbows,equipment};
  },
  compute(doc){
    const sc=this.scenario(doc); const recs=[]; const runs=sc.utilityRuns||[];
    // dust
    const dustRuns=runs.filter(r=>r.system==="dust"); let longest=0;
    for(const r of dustRuns){const rep=this.dustRunReport(doc,r); const sp=this.dustRunSP(doc,r);
      longest=Math.max(longest,rep.effectiveFt);
      const pl=sc.placements.find(p=>p.id===r.toPlacementId); const nm=pl?(pl.label||Model.def(pl.defId).name):"?";
      if(sp.under) recs.push({sev:"warning",text:`${nm} dust branch delivers ${sp.deliveredCfm.toFixed(0)} CFM, below the ${sp.targetCfm} CFM target for ${rep.diameter}in`});
      else if(rep.over) recs.push({sev:"warning",text:`${nm} dust run ${rep.effectiveFt.toFixed(0)} ft effective exceeds ${rep.maxFt} ft for ${rep.diameter}in`});
    }
    // electrical
    const panels=sc.utilityNodes.filter(n=>n.kind==="panel");
    const panel240 = panels.some(p=>(p.spec.voltage||240)>=240);
    let load120=0, load240=0;
    const elec=runs.filter(r=>r.system==="electrical");
    for(const r of elec){const a=this.loadOf(r);
      if((r.spec.voltage||120)>=240) load240+=a; else load120+=a; }
    for(const pl of sc.placements){const def=Model.def(pl.defId); if(!def||!def.power)continue;
      if(def.power.voltage>=240 && panels.length && !panel240)
        recs.push({sev:"error",text:`${pl.label||def.name} needs 240V but no panel supplies it`});}
    if(!panels.length && sc.utilityNodes.some(n=>n.kind==="receptacle"))
      recs.push({sev:"error",text:`outlets are placed but no panel supplies them`});
    if(!panels.length && sc.utilityNodes.some(n=>n.kind==="light"))
      recs.push({sev:"error",text:`light fixtures are placed but no panel supplies them`});
    for(const nd of sc.utilityNodes.filter(n=>(n.kind==="dust_collector"||n.kind==="compressor")&&n.spec&&n.spec.amps)){
      if(!panels.length) recs.push({sev:"error",text:`${nd.label} needs power but no panel supplies it`});
      else if((nd.spec.voltage||240)>=240 && !panel240) recs.push({sev:"error",text:`${nd.label} needs 240V but no panel supplies it`});}
    // per-circuit: breaker overload and voltage mismatch
    for(const p of panels){
      for(const c of this.circuitReport(doc,p)){
        if(c.over) recs.push({sev:"error",text:`circuit ${c.label} carries ${c.load}A over its ${c.amps}A breaker`});
        else if(c.hot) recs.push({sev:"warning",text:`circuit ${c.label} at ${c.load}A exceeds 80% of its ${c.amps}A breaker`});
      }
      const cmap={}; for(const c of (p.spec.circuits||[]))cmap[c.id]=c;
      for(const r of elec.filter(r=>r.fromNode===p.id&&r.circuitId)){
        const c=cmap[r.circuitId]; if(c && (r.spec.voltage||120) > c.voltage){
          const pl=sc.placements.find(x=>x.id===r.toPlacementId); const nm=pl?(pl.label||Model.def(pl.defId).name):"?";
          recs.push({sev:"error",text:`${nm} needs ${r.spec.voltage}V on a ${c.voltage}V circuit ${c.label}`});}
      }
    }
    // total connected vs panel main (240V equivalent amps: 120V loads count half on a 240V main)
    if(panels.length){
      const main=Math.max(...panels.map(p=>p.spec.mainAmps||100));
      const connected240 = load240 + load120/2;
      if(connected240 > main*0.8)
        recs.push({sev:"warning",text:`connected load ${connected240.toFixed(0)}A over 80% of ${main}A panel`});
    }
    // compressed air: total consumer demand vs compressor capacity
    const compressors=sc.utilityNodes.filter(n=>n.kind==="compressor");
    const airRuns=runs.filter(r=>r.system==="air");
    let airDemand=0; for(const r of airRuns) airDemand+=(r.spec.cfm||0);
    const airCapacity=compressors.reduce((t,c)=>t+(c.spec.scfm||0),0);
    for(const pl of sc.placements){const def=Model.def(pl.defId); if(!def||!def.airPort)continue;
      if(!compressors.length) recs.push({sev:"error",text:`${pl.label||def.name} needs compressed air but no compressor supplies it`});}
    if(compressors.length && airDemand>airCapacity)
      recs.push({sev:"error",text:`air demand ${airDemand} CFM exceeds compressor capacity ${airCapacity} SCFM`});
    else if(compressors.length && airDemand>airCapacity*0.8)
      recs.push({sev:"warning",text:`air demand ${airDemand} CFM over 80% of ${airCapacity} SCFM capacity`});
    const errors=recs.filter(r=>r.sev==="error").length, warnings=recs.filter(r=>r.sev==="warning").length;
    return {records:recs, load120, load240, longestDustFt:longest, dustRunCount:dustRuns.length,
      elecRunCount:elec.length, airRunCount:airRuns.length, airDemand, airCapacity, errors, warnings};
  }
};

/* ---- PLAT: scenario compare ---- */
const Compare = {
  withScenario(doc,scId,fn){const prev=doc.activeScenarioId; doc.activeScenarioId=scId;
    try{return fn();}finally{doc.activeScenarioId=prev;}},
  flowDistanceFt(doc,scId){return this.withScenario(doc,scId,()=>{
    const sc=doc.scenarios.find(s=>s.id===scId);
    return (sc.flows||[]).reduce((t,f)=>t+Flow.metrics(doc,f).feet,0);});},
  summary(doc,scId){return this.withScenario(doc,scId,()=>{
    const t=Trim.compute(doc), sv=Services.compute(doc);
    return {trimErrors:t.errors,trimWarnings:t.warnings,
      svcErrors:sv.errors,svcWarnings:sv.warnings,
      flowFt:this.flowDistanceFt(doc,scId)};});},
  delta(doc,aId,bId){
    const scA=doc.scenarios.find(s=>s.id===aId), scB=doc.scenarios.find(s=>s.id===bId);
    const aMap={},bMap={};
    for(const p of scA.placements)aMap[p.id]=p;
    for(const p of scB.placements)bMap[p.id]=p;
    const added=[],removed=[],moved=[],same=[];
    for(const id in bMap){ if(!aMap[id])added.push(bMap[id]);
      else{const a=aMap[id],b=bMap[id];
        if(a.position[0]!==b.position[0]||a.position[1]!==b.position[1]||(a.rotation||0)!==(b.rotation||0)||!!a.mirrored!==!!b.mirrored)moved.push(b);
        else same.push(b);}}
    for(const id in aMap) if(!bMap[id])removed.push(aMap[id]);
    return {added,removed,moved,same,
      a:this.summary(doc,aId),b:this.summary(doc,bId),
      nameA:scA.name,nameB:scB.name};
  }
};

/* ---- PLAT: print paper sizes, scales, multi-page tiling ---- */
const Print = {
  PAPER:{letter:[8.5,11], legal:[8.5,14], tabloid:[11,17], a4:[8.27,11.69], a3:[11.69,16.54]},
  MARGIN:0.5,
  // paper inches drawn per real inch of shop; null = fit to one page
  SCALES:{fit:null, half_in:0.5/12, quarter_in:0.25/12, eighth_in:0.125/12},
  scaleLabel:{fit:"fit to page", half_in:'1/2" = 1\'', quarter_in:'1/4" = 1\'', eighth_in:'1/8" = 1\''},
  paperLabel:{letter:"Letter", legal:"Legal", tabloid:"Tabloid", a4:"A4", a3:"A3"},
  printable(paper,orient){let [w,h]=this.PAPER[paper]; if(orient==="landscape")[w,h]=[h,w];
    return [w-2*this.MARGIN, h-2*this.MARGIN, w, h];},
  // tiling plan for a plat vbW x vbH (plat units = inches incl. pad) at a fixed scale s
  plan(vbW,vbH,printW,printH,s){
    const realPerPageW=printW/s, realPerPageH=printH/s;
    const cols=Math.max(1,Math.ceil(vbW/realPerPageW - 1e-9)), rows=Math.max(1,Math.ceil(vbH/realPerPageH - 1e-9));
    return {cols,rows,pages:cols*rows,realPerPageW,realPerPageH};
  },
  // resolve auto orientation to whichever needs fewer pages
  resolveOrient(paper,orient,scaleKey,vbW,vbH){
    const s=this.SCALES[scaleKey];
    if(orient!=="auto"||s==null) return orient==="auto"?"landscape":orient;
    const L=this.printable(paper,"landscape"), P=this.printable(paper,"portrait");
    const pl=this.plan(vbW,vbH,L[0],L[1],s).pages, pp=this.plan(vbW,vbH,P[0],P[1],s).pages;
    return pl<=pp?"landscape":"portrait";
  }
};

/* ---- history: snapshot undo/redo ---- */
const History = {
  states:[], idx:-1, MAX:80, suspend:false, dragging:false, onRecord:null,
  snapshot(doc){const c=Object.assign({},doc); delete c.library; return JSON.stringify(c);},
  restore(s){const d=JSON.parse(s); d.library=SEED.library; return d;},
  reset(){this.states=[]; this.idx=-1;},
  record(doc){
    if(this.suspend||this.dragging) return;
    const s=this.snapshot(doc);
    if(this.idx>=0 && this.states[this.idx]===s) return;      // no-op dedupe
    this.states=this.states.slice(0,this.idx+1);              // drop any redo tail
    this.states.push(s); this.idx=this.states.length-1;
    if(this.states.length>this.MAX){this.states.shift(); this.idx--;}
    if(this.onRecord) try{this.onRecord();}catch(_){}
  },
  canUndo(){return this.idx>0;},
  canRedo(){return this.idx<this.states.length-1;},
  undo(){if(this.idx<=0)return null; this.idx--; return this.restore(this.states[this.idx]);},
  redo(){if(this.idx>=this.states.length-1)return null; this.idx++; return this.restore(this.states[this.idx]);}
};

/* ---- render + interaction ---- */
const View = {
  el:null,doc:null,pad:24,_b:null,_H:0,conflicts:null,
  mount(el){this.el=el; if(el&&el.style)el.style.touchAction="none"; this.bindPointer();},
  scene(doc){this.doc=doc; this.conflicts=Trim.compute(doc); this.draw(); UI.syncPanels(); History.record(doc);},
  refresh(){this.conflicts=Trim.compute(this.doc); this.draw(); UI.syncPanels(); History.record(this.doc);},
  toScreen(pt){return[pt[0]-this._b.minX+this.pad, this._H-(pt[1]-this._b.minY)+this.pad];},
  screenToWorld(clientX,clientY){
    const svg=this.el.querySelector("svg"); if(!svg||!this._b) return [0,0];
    const rect=svg.getBoundingClientRect();
    const vbW=(this._b.maxX-this._b.minX)+this.pad*2, vbH=(this._b.maxY-this._b.minY)+this.pad*2;
    // invert preserveAspectRatio="xMidYMid meet": uniform scale to fit, content centered
    const scale=Math.min(rect.width/vbW, rect.height/vbH) || 1;
    const offX=(rect.width - vbW*scale)/2, offY=(rect.height - vbH*scale)/2;
    const vx=(clientX-rect.left-offX)/scale, vy=(clientY-rect.top-offY)/scale;
    return [vx-this.pad+this._b.minX, this._b.minY+this._H+this.pad-vy];},
  polyStr(pts){return pts.map(p=>this.toScreen(p).join(",")).join(" ");},
  units(){return (this.doc&&this.doc.meta&&this.doc.meta.units)||"imperial";},
  fmtLen(inches){ if(this.units()==="metric"){const cm=inches*2.54; return cm>=100?(cm/100).toFixed(2)+" m":Math.round(cm)+" cm";}
    const ft=Math.floor(inches/12), inch=Math.round(inches-ft*12);
    if(ft&&inch)return ft+"' "+inch+'"'; if(ft)return ft+"'"; return inch+'"';},
  uSize(inches){return this.units()==="metric"?{v:Math.round(inches*2.54),u:"cm"}:{v:Math.round(inches),u:"in"};},
  uToInches(v){return this.units()==="metric"? v/2.54 : v;},
  sevColor(s){return s==="error"?"var(--hard)":s==="warning"?"var(--soft)":null;},
  draw(){
    const doc=this.doc,fac=doc.facility;
    const fb=G.bounds(fac.boundary); this._b=fb;
    const W=fb.maxX-fb.minX,H=fb.maxY-fb.minY; this._H=H;
    const vbW=W+this.pad*2,vbH=H+this.pad*2;
    const sc=doc.scenarios.find(s=>s.id===doc.activeScenarioId);
    const grid=doc.meta.gridSpacing||12;
    const sevVar={hard:"var(--hard)",soft:"var(--soft)",shared:"var(--shared)"};
    let g="";
    for(let x=fb.minX;x<=fb.maxX+.1;x+=grid){const a=this.toScreen([x,fb.minY]),c=this.toScreen([x,fb.maxY]);
      g+=`<line x1="${a[0]}" y1="${a[1]}" x2="${c[0]}" y2="${c[1]}" stroke="var(--grid)"/>`;}
    for(let y=fb.minY;y<=fb.maxY+.1;y+=grid){const a=this.toScreen([fb.minX,y]),c=this.toScreen([fb.maxX,y]);
      g+=`<line x1="${a[0]}" y1="${a[1]}" x2="${c[0]}" y2="${c[1]}" stroke="var(--grid)"/>`;}
    g+=`<polygon points="${this.polyStr(fac.boundary.vertices)}" fill="none" stroke="var(--ink)" stroke-width="1.5"/>`;
    // axis rulers: distance from the origin corner, labeled in the pad margins (unit follows meta.units)
    (()=>{const metric=this.units()==="metric";
      const IN_PER_M=39.3701;
      let stepX, stepY, labelOf, unit;
      if(metric){ unit="m";
        const spanX=(fb.maxX-fb.minX)/IN_PER_M, spanY=(fb.maxY-fb.minY)/IN_PER_M;
        const stepM=v=>v>18?5:v>7?2:v>3?1:0.5;
        stepX=stepM(spanX)*IN_PER_M; stepY=stepM(spanY)*IN_PER_M;
        labelOf=(d)=>{const m=d/IN_PER_M; return (+m.toFixed(1))+"";};
      } else {
        const div=(grid%12===0)?12:1; const suf=(grid%12===0)?"'":'"'; unit=(grid%12===0)?"ft":"in";
        const ftX=(fb.maxX-fb.minX)/12, ftY=(fb.maxY-fb.minY)/12;
        const stepFt=v=>v>60?10:v>28?5:v>14?2:1;
        stepX=(grid%12===0)?stepFt(ftX)*12:grid*(ftX>28?4:ftX>14?2:1);
        stepY=(grid%12===0)?stepFt(ftY)*12:grid*(ftY>28?4:ftY>14?2:1);
        labelOf=(d)=>Math.round(d/div)+suf;
      }
      for(let x=fb.minX;x<=fb.maxX+.1;x+=stepX){const s=this.toScreen([x,fb.maxY]);
        g+=`<line x1="${s[0]}" y1="${s[1]-3}" x2="${s[0]}" y2="${s[1]}" stroke="var(--ink-dim)" style="pointer-events:none"/>`;
        g+=`<text x="${s[0]}" y="${s[1]-6}" fill="var(--ink-dim)" font-size="7" font-family="var(--font-mono)" text-anchor="middle" style="pointer-events:none">${labelOf(x-fb.minX)}</text>`;}
      for(let y=fb.minY;y<=fb.maxY+.1;y+=stepY){const s=this.toScreen([fb.minX,y]);
        g+=`<line x1="${s[0]-3}" y1="${s[1]}" x2="${s[0]}" y2="${s[1]}" stroke="var(--ink-dim)" style="pointer-events:none"/>`;
        g+=`<text x="${s[0]-6}" y="${s[1]+2.5}" fill="var(--ink-dim)" font-size="7" font-family="var(--font-mono)" text-anchor="end" style="pointer-events:none">${labelOf(y-fb.minY)}</text>`;}
      g+=`<text x="${this.toScreen([fb.minX,fb.maxY])[0]-6}" y="${this.toScreen([fb.minX,fb.maxY])[1]-6}" fill="var(--brass)" font-size="6.5" font-family="var(--font-mono)" text-anchor="end" style="pointer-events:none">${unit}</text>`;})();
    for(const pl of sc.placements){const def=Model.def(pl.defId); if(!def)continue;
      for(const z of def.clearances){const wp=G.zoneWorldPoly(z,def,pl); const col=sevVar[z.severity]||"var(--ink-dim)";
        g+=`<polygon points="${this.polyStr(wp)}" fill="${col}" fill-opacity="0.15" stroke="${col}" stroke-opacity="0.5" stroke-width="1" stroke-dasharray="${z.severity==='hard'?'':'4 3'}" style="pointer-events:none"/>`;}}
    for(const pl of sc.placements){const def=Model.def(pl.defId); if(!def)continue;
      const fp=G.footprintWorldPoly(def,pl);
      const cs=this.sevColor(this.conflicts.worst[pl.id]);
      const stroke=cs||"var(--footprint)";
      g+=`<polygon points="${this.polyStr(fp)}" fill="${cs?stroke:'var(--footprint-fill)'}" fill-opacity="${cs?0.16:1}" stroke="${stroke}" stroke-width="${cs?2:1.5}"/>`;
      const a=this.toScreen(pl.position);
      g+=`<circle cx="${a[0]}" cy="${a[1]}" r="2.5" fill="var(--brass)" style="pointer-events:none"/>`;
      g+=`<text x="${a[0]}" y="${a[1]-8}" fill="var(--ink)" font-size="9" font-family="var(--font-mono)" text-anchor="middle" style="pointer-events:none">${pl.label||def.name}${pl.locked?" \u25a0":""}</text>`;
      if(pl.id===UI.selectedId){const bb=G.bounds({vertices:fp});
        const s1=this.toScreen([bb.minX,bb.maxY]),s2=this.toScreen([bb.maxX,bb.minY]);
        g+=`<rect x="${Math.min(s1[0],s2[0])-4}" y="${Math.min(s1[1],s2[1])-4}" width="${Math.abs(s2[0]-s1[0])+8}" height="${Math.abs(s2[1]-s1[1])+8}" fill="none" stroke="var(--brass)" stroke-width="1.5" stroke-dasharray="5 3" style="pointer-events:none"/>`;}
    }
    // flows overlay
    for(const fl of (sc.flows||[])){
      const pts=Flow.points(doc,fl); if(pts.length<1)continue;
      const sel=fl.id===UI.selectedFlowId||fl.id===UI.activeFlowId;
      const wpx=pts.length>1?this.polyStr(pts):"";
      if(pts.length>1)
        g+=`<polyline points="${wpx}" fill="none" stroke="${fl.color}" stroke-width="${sel?3:2}" stroke-opacity="${sel?1:0.8}" stroke-linejoin="round" stroke-linecap="round" style="pointer-events:none"/>`;
      // direction arrows at each segment midpoint
      for(let i=0;i<pts.length-1;i++){
        const a=this.toScreen(pts[i]),b=this.toScreen(pts[i+1]);
        const mx=(a[0]+b[0])/2,my=(a[1]+b[1])/2, ang=Math.atan2(b[1]-a[1],b[0]-a[0]);
        const s=4.5, c=Math.cos(ang),si=Math.sin(ang);
        const p1=[mx+c*s,my+si*s], p2=[mx-c*s+si*s*0.9,my-si*s-c*s*0.9], p3=[mx-c*s-si*s*0.9,my-si*s+c*s*0.9];
        g+=`<polygon points="${p1[0]},${p1[1]} ${p2[0]},${p2[1]} ${p3[0]},${p3[1]}" fill="${fl.color}" style="pointer-events:none"/>`;
      }
      // waypoint nodes: machine stops are circles, free bends are diamonds (drag handles when selected)
      for(let k=0;k<fl.waypoints.length;k++){const wp=fl.waypoints[k]; const wpt=Flow.wpWorld(doc,wp); if(!wpt)continue;
        const a=this.toScreen(wpt);
        if(wp.bend){const r=sel?5:3.5;
          g+=`<polygon points="${a[0]},${a[1]-r} ${a[0]+r},${a[1]} ${a[0]},${a[1]+r} ${a[0]-r},${a[1]}" fill="${sel?fl.color:'var(--ground)'}" fill-opacity="${sel?0.35:1}" stroke="${fl.color}" stroke-width="2" style="pointer-events:none"/>`;
        } else {
          g+=`<circle cx="${a[0]}" cy="${a[1]}" r="${sel?4:3}" fill="var(--ground)" stroke="${fl.color}" stroke-width="2" style="pointer-events:none"/>`;
        }}
    }
    // route-mode: show snap-target ports on every machine
    if(UI.mode==="route"){
      for(const pl of sc.placements){const def=Model.def(pl.defId); if(!def)continue;
        for(const port of (def.ports||[])){const w=G.toWorld(port.position,pl); const a=this.toScreen(w);
          g+=`<circle cx="${a[0]}" cy="${a[1]}" r="3.5" fill="var(--brass)" fill-opacity="0.85" stroke="var(--ground)" stroke-width="1" style="pointer-events:none"/>`;}}
    }
    // utilities graph overlay
    const vis=UI.vis||{dust:true,electrical:true,air:true};
    for(const run of (sc.utilityRuns||[])){
      const sysKey=run.system==="electrical"?"electrical":run.system; // dust | electrical | air
      if(vis[sysKey]===false) continue;
      const poly=Services.routePolyline(doc,run); if(poly.length<2)continue;
      const selR=run.id===UI.selectedRunId;
      if(run.system==="dust"){
        const sp=Services.dustRunSP(doc,run); const rep=Services.dustRunReport(doc,run);
        const col=(sp.under||rep.over)?"var(--hard)":"var(--dust)";
        g+=`<polyline points="${this.polyStr(poly)}" fill="none" stroke="${col}" stroke-width="${selR?5:4}" stroke-opacity="${selR?1:0.75}" stroke-linejoin="round" stroke-linecap="round" style="pointer-events:none"/>`;
        if(selR&&run.waypoints){for(const wp of run.waypoints){const a=this.toScreen(wp); const r=5;
          g+=`<polygon points="${a[0]},${a[1]-r} ${a[0]+r},${a[1]} ${a[0]},${a[1]+r} ${a[0]-r},${a[1]}" fill="var(--dust)" fill-opacity="0.4" stroke="var(--dust)" stroke-width="2" style="pointer-events:none"/>`;}}
      } else if(run.system==="air"){
        g+=`<polyline points="${this.polyStr(poly)}" fill="none" stroke="var(--air)" stroke-width="${selR?3:2}" stroke-dasharray="6 3" stroke-opacity="${selR?1:0.85}" stroke-linejoin="round" stroke-linecap="round" style="pointer-events:none"/>`;
        if(selR&&run.waypoints){for(const wp of run.waypoints){const a=this.toScreen(wp); const r=5;
          g+=`<polygon points="${a[0]},${a[1]-r} ${a[0]+r},${a[1]} ${a[0]},${a[1]+r} ${a[0]-r},${a[1]}" fill="var(--air)" fill-opacity="0.4" stroke="var(--air)" stroke-width="2" style="pointer-events:none"/>`;}}
      } else {
        const v=run.spec.voltage||120; const amps=run.spec.amps||0;
        const col=v>=240?"var(--power240)":"var(--power)";
        // dash pattern keyed to amperage: 15A fine, 20A medium, 30A+ long, 50A+ dash-dot
        const dash=amps>=50?"10 3 2 3":amps>=30?"9 4":amps>=20?"5 4":"2 3";
        g+=`<polyline points="${this.polyStr(poly)}" fill="none" stroke="${col}" stroke-width="${selR?2.5:1.5}" stroke-dasharray="${dash}" stroke-opacity="${selR?1:0.85}" style="pointer-events:none"/>`;
        // circuit label at the run midpoint
        const ck=(()=>{const p=(sc.utilityNodes||[]).find(n=>n.id===run.fromNode);
          const c=p&&(p.spec.circuits||[]).find(x=>x.id===run.circuitId); return c?c.label:null;})();
        if(ck){const mp=poly[Math.floor(poly.length/2)]; const a=this.toScreen(mp);
          g+=`<rect x="${a[0]-7}" y="${a[1]-6}" width="14" height="11" rx="2" fill="var(--ground)" fill-opacity="0.9" style="pointer-events:none"/>`;
          g+=`<text x="${a[0]}" y="${a[1]+2.5}" fill="${col}" font-size="7.5" font-family="var(--font-mono)" text-anchor="middle" style="pointer-events:none">${ck}</text>`;}
        if(selR&&run.waypoints){for(const wp of run.waypoints){const a=this.toScreen(wp); const r=5;
          g+=`<polygon points="${a[0]},${a[1]-r} ${a[0]+r},${a[1]} ${a[0]},${a[1]+r} ${a[0]-r},${a[1]}" fill="${col}" fill-opacity="0.4" stroke="${col}" stroke-width="2" style="pointer-events:none"/>`;}}
      }
      if(selR){const mid=poly[Math.floor(poly.length/2)]; const a=this.toScreen(mid);
        g+=`<circle cx="${a[0]}" cy="${a[1]}" r="9" fill="none" stroke="var(--brass)" stroke-width="1.5" stroke-dasharray="4 3" style="pointer-events:none"/>`;}
    }
    for(const nd of (sc.utilityNodes||[])){
      const a=this.toScreen(nd.position); const selN=nd.id===UI.selectedNodeId;
      if(nd.kind==="dust_collector"){
        g+=`<circle cx="${a[0]}" cy="${a[1]}" r="7" fill="var(--dust)" stroke="var(--ground)" stroke-width="1.5"/>`;
        g+=`<circle cx="${a[0]}" cy="${a[1]}" r="2.5" fill="var(--ground)" style="pointer-events:none"/>`;
      } else if(nd.kind==="panel"){
        g+=`<rect x="${a[0]-6}" y="${a[1]-8}" width="12" height="16" fill="var(--power)" stroke="var(--ground)" stroke-width="1.5"/>`;
        g+=`<line x1="${a[0]-3}" y1="${a[1]-3}" x2="${a[0]+3}" y2="${a[1]-3}" stroke="var(--ground)" style="pointer-events:none"/>`;
        g+=`<line x1="${a[0]-3}" y1="${a[1]+1}" x2="${a[0]+3}" y2="${a[1]+1}" stroke="var(--ground)" style="pointer-events:none"/>`;
      } else if(nd.kind==="compressor"){
        g+=`<rect x="${a[0]-7}" y="${a[1]-6}" width="14" height="12" rx="3" fill="var(--air)" stroke="var(--ground)" stroke-width="1.5"/>`;
        g+=`<circle cx="${a[0]}" cy="${a[1]}" r="3" fill="none" stroke="var(--ground)" stroke-width="1.5" style="pointer-events:none"/>`;
      } else if(nd.kind==="receptacle"){
        const rc=(nd.spec.voltage||120)>=240?"var(--power240)":"var(--power)";
        g+=`<circle cx="${a[0]}" cy="${a[1]}" r="6" fill="${rc}" stroke="var(--ground)" stroke-width="1.5"/>`;
        g+=`<line x1="${a[0]-2}" y1="${a[1]-2}" x2="${a[0]-2}" y2="${a[1]+1}" stroke="var(--ground)" stroke-width="1.3" style="pointer-events:none"/>`;
        g+=`<line x1="${a[0]+2}" y1="${a[1]-2}" x2="${a[0]+2}" y2="${a[1]+1}" stroke="var(--ground)" stroke-width="1.3" style="pointer-events:none"/>`;
        g+=`<text x="${a[0]}" y="${a[1]+15}" fill="var(--ink-dim)" font-size="7" font-family="var(--font-mono)" text-anchor="middle" style="pointer-events:none">${nd.spec.voltage||120}V ${nd.spec.amps||20}A</text>`;
      } else if(nd.kind==="light"){
        g+=`<circle cx="${a[0]}" cy="${a[1]}" r="6.5" fill="var(--soft)" fill-opacity="0.85" stroke="var(--ground)" stroke-width="1.3"/>`;
        g+=`<line x1="${a[0]-4.5}" y1="${a[1]}" x2="${a[0]+4.5}" y2="${a[1]}" stroke="var(--ground)" stroke-width="1.1" style="pointer-events:none"/>`;
        g+=`<line x1="${a[0]}" y1="${a[1]-4.5}" x2="${a[0]}" y2="${a[1]+4.5}" stroke="var(--ground)" stroke-width="1.1" style="pointer-events:none"/>`;
        g+=`<text x="${a[0]}" y="${a[1]+15}" fill="var(--ink-dim)" font-size="7" font-family="var(--font-mono)" text-anchor="middle" style="pointer-events:none">${nd.spec.watts||40}W</text>`;
      }
      if(nd.kind!=="receptacle"&&nd.kind!=="light") g+=`<text x="${a[0]}" y="${a[1]-11}" fill="var(--ink)" font-size="8" font-family="var(--font-mono)" text-anchor="middle" style="pointer-events:none">${nd.label}</text>`;
      if(selN) g+=`<circle cx="${a[0]}" cy="${a[1]}" r="11" fill="none" stroke="var(--brass)" stroke-width="1.5" stroke-dasharray="4 3" style="pointer-events:none"/>`;
    }
    // facility features (columns, doors, windows)
    g+=this.featureSVG(doc, p=>this.toScreen(p), {ink:"var(--ink)",dim:"var(--ink-dim)",line:"var(--line)",hard:"var(--hard)"}, UI.selectedFeatureId);
    // plat notes (annotations): a pin plus multi-line text
    if(UI.showNotes!==false) for(const an of (sc.annotations||[])){const a=this.toScreen(an.position); const selA=an.id===UI.selectedAnnotationId;
      const lines=String(an.text||"").split("\n");
      g+=`<rect x="${a[0]-4}" y="${a[1]-4}" width="8" height="8" rx="1.5" fill="var(--brass)" stroke="var(--ground)" stroke-width="1.2"/>`;
      const tx=a[0]+8, ty=a[1]-2;
      const tsp=lines.map((ln,i)=>`<tspan x="${tx}" dy="${i===0?0:11}">${(ln||" ").replace(/&/g,"&amp;").replace(/</g,"&lt;")}</tspan>`).join("");
      g+=`<text x="${tx}" y="${ty}" fill="var(--ink)" font-size="9" font-family="var(--font-mono)" style="pointer-events:none">${tsp}</text>`;
      if(selA)g+=`<rect x="${a[0]-7}" y="${a[1]-7}" width="14" height="14" rx="2" fill="none" stroke="var(--brass)" stroke-width="1.5" stroke-dasharray="4 3" style="pointer-events:none"/>`;}
    // sounding mode: boundary vertex handles
    if(UI.mode==="sounding"){
      fac.boundary.vertices.forEach((v,i)=>{const a=this.toScreen(v);
        const sel=i===UI.selectedVertex;
        g+=`<rect x="${a[0]-4}" y="${a[1]-4}" width="8" height="8" fill="${sel?'var(--brass)':'var(--ground)'}" stroke="var(--brass)" stroke-width="1.5"/>`;});
    }
    // draw-walls mode: draft polyline with vertex dots, first point highlighted as the close target
    if(UI.mode==="drawwalls" && UI.draftWalls){
      const pts=UI.draftWalls.map(v=>this.toScreen(v));
      if(pts.length>1) g+=`<polyline points="${pts.map(p=>p.join(",")).join(" ")}" fill="none" stroke="var(--brass)" stroke-width="1.5" stroke-dasharray="5 3"/>`;
      pts.forEach((a,i)=>{const first=i===0;
        g+=`<circle cx="${a[0]}" cy="${a[1]}" r="${first?5:3.5}" fill="${first?'var(--brass)':'var(--ground)'}" stroke="var(--brass)" stroke-width="1.5"/>`;});
    }
