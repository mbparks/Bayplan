      const mp=UI.measurePts; const scr=mp.map(p=>this.toScreen(p));
      if(scr.length>1) g+=`<polyline points="${scr.map(p=>p.join(",")).join(" ")}" fill="none" stroke="var(--brass)" stroke-width="1.5" style="pointer-events:none"/>`;
      let total=0;
      for(let i=1;i<mp.length;i++){const d=Math.hypot(mp[i][0]-mp[i-1][0],mp[i][1]-mp[i-1][1]); total+=d;
        const m=[(scr[i][0]+scr[i-1][0])/2,(scr[i][1]+scr[i-1][1])/2];
        g+=`<rect x="${m[0]-16}" y="${m[1]-6}" width="32" height="11" rx="2" fill="var(--ground)" fill-opacity="0.85" style="pointer-events:none"/>`;
        g+=`<text x="${m[0]}" y="${m[1]+2}" fill="var(--brass)" font-size="7.5" font-family="var(--font-mono)" text-anchor="middle" style="pointer-events:none">${this.fmtLen(d)}</text>`;}
      scr.forEach((a,i)=>{g+=`<circle cx="${a[0]}" cy="${a[1]}" r="${i===scr.length-1?4:3}" fill="var(--ground)" stroke="var(--brass)" stroke-width="2" style="pointer-events:none"/>`;});
      if(mp.length>1){const last=scr[scr.length-1];
        g+=`<text x="${last[0]+8}" y="${last[1]-8}" fill="var(--brass)" font-size="8.5" font-family="var(--font-mono)" style="pointer-events:none">\u03a3 ${this.fmtLen(total)}</text>`;}
    }
    // north arrow, bottom-right (title block is reserved for the printed plat)
    g+=`<g transform="translate(${vbW-18},${vbH-14})" style="pointer-events:none">
      <polygon points="0,-11 3.5,4 0,1 -3.5,4" fill="var(--brass)"/>
      <text x="0" y="-13" fill="var(--brass)" font-size="8" font-family="var(--font-mono)" text-anchor="middle">N</text></g>`;
    this.el.innerHTML=`<svg viewBox="0 0 ${vbW} ${vbH}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Workshop floor plat">${g}</svg>`;
  },
  // shared feature renderer (columns, doors, windows), used by draw and platSVG
  featureSVG(doc,S,pal,selId){
    let g="";
    for(const f of (doc.facility.features||[])){
      const sel=f.id===selId;
      if(f.kind==="column"){
        const poly=Feat.columnPoly(f).map(p=>S(p).join(",")).join(" ");
        g+=`<polygon points="${poly}" fill="${pal.ink}" fill-opacity="0.85" stroke="${pal.ink}" stroke-width="1"/>`;
      } else if(f.kind==="door"){
        const swing=Feat.doorSwingPoly(f).map(p=>S(p).join(",")).join(" ");
        const hinge=S(f.position), leaf=S(Feat.doorLeafEnd(f));
        g+=`<polygon points="${swing}" fill="${pal.dim}" fill-opacity="0.10" stroke="${pal.dim}" stroke-width="1" stroke-dasharray="3 3"/>`;
        g+=`<line x1="${hinge[0]}" y1="${hinge[1]}" x2="${leaf[0]}" y2="${leaf[1]}" stroke="${pal.ink}" stroke-width="2"/>`;
        g+=`<circle cx="${hinge[0]}" cy="${hinge[1]}" r="2.5" fill="${pal.ink}"/>`;
      } else if(f.kind==="window"){
        const seg=Feat.windowSeg(f); const a=S(seg[0]),b=S(seg[1]);
        g+=`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="${pal.line}" stroke-width="3"/>`;
        g+=`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="${pal.ink}" stroke-width="1" stroke-dasharray="2 3"/>`;
      }
      if(sel){const c=S(f.position);
        g+=`<circle cx="${c[0]}" cy="${c[1]}" r="12" fill="none" stroke="var(--brass)" stroke-width="1.5" stroke-dasharray="4 3"/>`;}
    }
    return g;
  },
  // standalone plat renderer for compare (screen) and print (paper); no interaction
  platSVG(doc,scId,opt={}){
    const pal = opt.palette==="print"
      ? {ink:"#111",dim:"#555",line:"#bbb",grid:"#eee",fp:"#333",fpFill:"#f4f4f4",panel:"#fff",
         hard:"#c23a32",soft:"#a9761a",shared:"#1f7d74",dust:"#8a7a52",power:"#6a4f88",brass:"#7a5f10"}
      : {ink:"var(--ink)",dim:"var(--ink-dim)",line:"var(--line)",grid:"var(--grid)",fp:"var(--footprint)",
         fpFill:"var(--footprint-fill)",panel:"var(--panel)",hard:"var(--hard)",soft:"var(--soft)",
         shared:"var(--shared)",dust:"var(--dust)",power:"var(--power)",brass:"var(--brass)"};
    const sevVar={hard:pal.hard,soft:pal.soft,shared:pal.shared};
    const sc=doc.scenarios.find(s=>s.id===scId); const fac=doc.facility;
    const fb=G.bounds(fac.boundary); const pad=this.pad;
    const W=fb.maxX-fb.minX,H=fb.maxY-fb.minY; const vbW=W+pad*2,vbH=H+pad*2;
    const S=pt=>[pt[0]-fb.minX+pad, H-(pt[1]-fb.minY)+pad];
    const PS=pts=>pts.map(p=>S(p).join(",")).join(" ");
    const grid=doc.meta.gridSpacing||12;
    const conf = opt.conflicts ? Compare.withScenario(doc,scId,()=>Trim.compute(doc)) : {worst:{}};
    let g="";
    for(let x=fb.minX;x<=fb.maxX+.1;x+=grid){const a=S([x,fb.minY]),c=S([x,fb.maxY]);
      g+=`<line x1="${a[0]}" y1="${a[1]}" x2="${c[0]}" y2="${c[1]}" stroke="${pal.grid}"/>`;}
    for(let y=fb.minY;y<=fb.maxY+.1;y+=grid){const a=S([fb.minX,y]),c=S([fb.maxX,y]);
      g+=`<line x1="${a[0]}" y1="${a[1]}" x2="${c[0]}" y2="${c[1]}" stroke="${pal.grid}"/>`;}
    g+=`<polygon points="${PS(fac.boundary.vertices)}" fill="none" stroke="${pal.ink}" stroke-width="1.5"/>`;
    for(const pl of sc.placements){const def=Model.def(pl.defId); if(!def)continue;
      for(const z of def.clearances){const wp=G.zoneWorldPoly(z,def,pl); const col=sevVar[z.severity]||pal.dim;
        g+=`<polygon points="${PS(wp)}" fill="${col}" fill-opacity="0.13" stroke="${col}" stroke-opacity="0.45" stroke-width="1" stroke-dasharray="${z.severity==='hard'?'':'4 3'}"/>`;}}
    for(const run of (sc.utilityRuns||[])){const poly=Services.routePolyline(doc,run); if(poly.length<2)continue;
      if(run.system==="dust"){const rep=Services.dustRunReport(doc,run);
        g+=`<polyline points="${PS(poly)}" fill="none" stroke="${rep.over?pal.hard:pal.dust}" stroke-width="4" stroke-opacity="0.7" stroke-linejoin="round"/>`;}
      else g+=`<polyline points="${PS(poly)}" fill="none" stroke="${pal.power}" stroke-width="1.5" stroke-dasharray="2 4" stroke-opacity="0.85"/>`;}
    for(const fl of (sc.flows||[])){const pts=(fl.waypoints||[]).map(wp=>Compare.withScenario(doc,scId,()=>Flow.wpWorld(doc,wp))).filter(Boolean);
      if(pts.length>1)g+=`<polyline points="${PS(pts)}" fill="none" stroke="${fl.color}" stroke-width="2" stroke-linejoin="round"/>`;
      for(const p of pts){const a=S(p); g+=`<circle cx="${a[0]}" cy="${a[1]}" r="3" fill="${pal.panel==='#fff'?'#fff':'var(--ground)'}" stroke="${fl.color}" stroke-width="2"/>`;}}
    for(const pl of sc.placements){const def=Model.def(pl.defId); if(!def)continue;
      const fp=G.footprintWorldPoly(def,pl);
      const cs=conf.worst[pl.id]; const stroke=cs==="error"?pal.hard:cs==="warning"?pal.soft:pal.fp;
      g+=`<polygon points="${PS(fp)}" fill="${cs?stroke:pal.fpFill}" fill-opacity="${cs?0.16:1}" stroke="${stroke}" stroke-width="${cs?2:1.5}"/>`;
      const a=S(pl.position);
      g+=`<text x="${a[0]}" y="${a[1]-7}" fill="${pal.ink}" font-size="8.5" font-family="var(--font-mono)" text-anchor="middle">${pl.label||def.name}</text>`;}
    for(const nd of (sc.utilityNodes||[])){const a=S(nd.position);
      if(nd.kind==="dust_collector") g+=`<circle cx="${a[0]}" cy="${a[1]}" r="7" fill="${pal.dust}" stroke="${pal.panel}" stroke-width="1.5"/>`;
      else if(nd.kind==="receptacle"){g+=`<circle cx="${a[0]}" cy="${a[1]}" r="5.5" fill="${pal.power}" stroke="${pal.panel}" stroke-width="1.3"/>`;
        g+=`<text x="${a[0]}" y="${a[1]+13}" fill="${pal.dim}" font-size="7" font-family="var(--font-mono)" text-anchor="middle">${nd.spec.voltage||120}V ${nd.spec.amps||20}A</text>`;}
      else if(nd.kind==="light"){g+=`<circle cx="${a[0]}" cy="${a[1]}" r="6" fill="${pal.soft}" fill-opacity="0.85" stroke="${pal.panel}" stroke-width="1.2"/>`;
        g+=`<line x1="${a[0]-4}" y1="${a[1]}" x2="${a[0]+4}" y2="${a[1]}" stroke="${pal.panel}" stroke-width="1"/><line x1="${a[0]}" y1="${a[1]-4}" x2="${a[0]}" y2="${a[1]+4}" stroke="${pal.panel}" stroke-width="1"/>`;
        g+=`<text x="${a[0]}" y="${a[1]+13}" fill="${pal.dim}" font-size="7" font-family="var(--font-mono)" text-anchor="middle">${nd.spec.watts||40}W</text>`;}
      else if(nd.kind==="panel") g+=`<rect x="${a[0]-6}" y="${a[1]-8}" width="12" height="16" fill="${pal.power}" stroke="${pal.panel}" stroke-width="1.5"/>`;
      if(nd.kind!=="receptacle"&&nd.kind!=="light") g+=`<text x="${a[0]}" y="${a[1]-11}" fill="${pal.ink}" font-size="8" font-family="var(--font-mono)" text-anchor="middle">${nd.label}</text>`;}
    g+=this.featureSVG(doc, S, {ink:pal.ink,dim:pal.dim,line:pal.line,hard:pal.hard}, null);
    if(opt.notes!==false) for(const an of (sc.annotations||[])){const a=S(an.position); const lines=String(an.text||"").split("\n");
      g+=`<rect x="${a[0]-4}" y="${a[1]-4}" width="8" height="8" rx="1.5" fill="${pal.brass}" stroke="${pal.panel}" stroke-width="1.2"/>`;
      const tx=a[0]+8; const tsp=lines.map((ln,i)=>`<tspan x="${tx}" dy="${i===0?0:11}">${(ln||" ").replace(/&/g,"&amp;").replace(/</g,"&lt;")}</tspan>`).join("");
      g+=`<text x="${tx}" y="${a[1]-2}" fill="${pal.ink}" font-size="9" font-family="var(--font-mono)">${tsp}</text>`;}
    // title block, scale bar, north arrow, legend (issued plat)
    if(opt.titleBlock){
      const d=doc.meta; const date=d.date||new Date().toISOString().slice(0,10);
      const bw=180,bh=64,bx=vbW-bw-6,by=vbH-bh-6;
      g+=`<g font-family="var(--font-mono)">
        <rect x="${bx}" y="${by}" width="${bw}" height="${bh}" fill="${pal.panel}" stroke="${pal.ink}" stroke-width="1"/>
        <line x1="${bx}" y1="${by+16}" x2="${bx+bw}" y2="${by+16}" stroke="${pal.line}"/>
        <line x1="${bx}" y1="${by+40}" x2="${bx+bw}" y2="${by+40}" stroke="${pal.line}"/>
        <line x1="${bx+bw*0.6}" y1="${by+16}" x2="${bx+bw*0.6}" y2="${by+bh}" stroke="${pal.line}"/>
        <text x="${bx+7}" y="${by+11}" fill="${pal.ink}" font-size="9" letter-spacing="1.2">${(d.title||'UNTITLED').toUpperCase()}</text>
        <text x="${bx+7}" y="${by+28}" fill="${pal.dim}" font-size="7.5">${(d.units==='metric')?'METRIC':'IMPERIAL'}</text>
        <text x="${bx+7}" y="${by+37}" fill="${pal.dim}" font-size="7.5">${(doc.facility.name||'').toUpperCase()}</text>
        <text x="${bx+bw*0.6+6}" y="${by+28}" fill="${pal.dim}" font-size="7.5">REV ${d.revision||'A'}</text>
        <text x="${bx+bw*0.6+6}" y="${by+37}" fill="${pal.dim}" font-size="7.5">${date}</text>
        <text x="${bx+7}" y="${by+52}" fill="${pal.dim}" font-size="7.5">DRAWN ${(d.author||'').toUpperCase()}</text>
        <text x="${bx+7}" y="${by+61}" fill="${pal.dim}" font-size="7.5">SHEET ${sc.name.toUpperCase()}</text>
        <text x="${bx+bw*0.6+6}" y="${by+55}" fill="${pal.brass}" font-size="7.5">BAYPLAN FI-075</text>
        <g transform="translate(${bx+bw-16},${by+12})"><polygon points="0,-8 3,3 0,1 -3,3" fill="${pal.brass}"/><text x="0" y="-10" fill="${pal.brass}" font-size="7" text-anchor="middle">N</text></g>
      </g>`;
      // scale bar: 24 inches (2 ft)
      const sbx=6+pad, sby=vbH-14, len=24;
      g+=`<g font-family="var(--font-mono)"><line x1="${sbx}" y1="${sby}" x2="${sbx+len}" y2="${sby}" stroke="${pal.ink}" stroke-width="1.5"/>
        <line x1="${sbx}" y1="${sby-3}" x2="${sbx}" y2="${sby+3}" stroke="${pal.ink}"/>
        <line x1="${sbx+len}" y1="${sby-3}" x2="${sbx+len}" y2="${sby+3}" stroke="${pal.ink}"/>
        <text x="${sbx+len/2}" y="${sby-5}" fill="${pal.dim}" font-size="7" text-anchor="middle">2 ft</text></g>`;
    }
    if(opt.legend){
      const items=[["Hard clearance",pal.hard],["Soft clearance",pal.soft],["Shared clearance",pal.shared],
        ["Dust run",pal.dust],["Electrical",pal.power]];
      const lx=6+pad, ly=6+pad;
      g+=`<g font-family="var(--font-mono)">`;
      items.forEach((it,i)=>{const y=ly+i*12;
        g+=`<rect x="${lx}" y="${y}" width="9" height="9" fill="${it[1]}" fill-opacity="0.5" stroke="${it[1]}"/>`;
        g+=`<text x="${lx+13}" y="${y+8}" fill="${pal.ink}" font-size="7.5">${it[0]}</text>`;});
      g+=`</g>`;
    }
    return {svg:`<svg viewBox="0 0 ${vbW} ${vbH}" preserveAspectRatio="xMidYMid meet">${g}</svg>`, g, vbW, vbH, pad};
  },
  bindPointer(){
    const host=this.el; if(!host) return;
    let drag=null;
    host.addEventListener("pointerdown",e=>{
      if(!this.el.querySelector("svg")) return;
      if(e.button!=null && e.button!==0) return; // primary button / touch only
      e.preventDefault();
      const w=this.screenToWorld(e.clientX,e.clientY);
      const sc=this.doc.scenarios.find(s=>s.id===this.doc.activeScenarioId);
      if(UI.mode==="measure"){ UI.addMeasurePt(w, e.altKey); return; }
      if(UI.mode==="drawwalls"){
        const pt=[Math.round(w[0]),Math.round(w[1])];
        const draft=UI.draftWalls;
        if(draft.length>=3){const f=draft[0]; if(Math.hypot(f[0]-pt[0],f[1]-pt[1])<12){UI.finishDrawWalls(); return;}}
        draft.push(pt); this.refresh(); return;
      }
      if(UI.mode==="services"){
        // 1. drag a bend of the selected run (dust, air, or electrical)
        if(UI.selectedRunId){const run=sc.utilityRuns.find(r=>r.id===UI.selectedRunId);
          if(run&&run.waypoints){for(let k=0;k<run.waypoints.length;k++){const wp=run.waypoints[k];
            if(Math.hypot(wp[0]-w[0],wp[1]-w[1])<10){drag={svcBendRun:run.id,svcBendIdx:k,offX:w[0]-wp[0],offY:w[1]-wp[1]};
              History.dragging=true; host.setPointerCapture(e.pointerId); return;}}}}
        // 2. hit-test utility nodes (within ~12in), drag/select
        let hn=null,bd=12;
        for(const n of sc.utilityNodes){const d=Math.hypot(n.position[0]-w[0],n.position[1]-w[1]);
          if(d<bd){bd=d;hn=n;}}
        if(hn){ UI.selectNode(hn.id);
          drag={node:hn.id,offX:w[0]-hn.position[0],offY:w[1]-hn.position[1]};
          History.dragging=true; host.setPointerCapture(e.pointerId); return;
        }
        // 3. hit-test visible runs: click a run to select it; click along a selected routed run to add a bend
        const vis=UI.vis||{dust:true,electrical:true,air:true};
        let near=null,nd=Infinity,nseg=0;
        for(const r of (sc.utilityRuns||[])){ if(vis[r.system==="electrical"?"electrical":r.system]===false) continue;
          const poly=Services.routePolyline(this.doc,r);
          for(let i=0;i<poly.length-1;i++){const c=Feat.closestOnSeg(w,poly[i],poly[i+1]);
            const d=Math.hypot(c[0]-w[0],c[1]-w[1]); if(d<nd){nd=d;near=r;nseg=i;}}}
        if(UI.selectedRunId&&near&&near.id===UI.selectedRunId&&nd<20){
          UI.addDustBend(near.id,[w[0],w[1]],nseg); return; }
        if(near&&nd<10){ UI.selectRun(near.id); return; }
        UI.selectNode(null); UI.selectRun(null);
        return;
      }
      if(UI.mode==="sounding"){
        const V=this.doc.facility.boundary.vertices;
        // boundary vertex handles first (within ~12in)
        let vi=-1,bd=12;
        V.forEach((v,i)=>{const d=Math.hypot(v[0]-w[0],v[1]-w[1]); if(d<bd){bd=d;vi=i;}});
        if(vi>=0){ UI.selectVertex(vi);
          drag={vertex:vi,offX:w[0]-V[vi][0],offY:w[1]-V[vi][1]}; History.dragging=true; host.setPointerCapture(e.pointerId); return; }
        // then features
        let hf=null;
        for(let i=this.doc.facility.features.length-1;i>=0;i--){const f=this.doc.facility.features[i];
          const near=Math.hypot(f.position[0]-w[0],f.position[1]-w[1])<12;
          const inCol=f.kind==="column"&&G.pointInPolygon(w,Feat.columnPoly(f));
          if(near||inCol){hf=f;break;}}
        if(hf){ UI.selectFeature(hf.id);
          drag={feature:hf.id,offX:w[0]-hf.position[0],offY:w[1]-hf.position[1]}; History.dragging=true; host.setPointerCapture(e.pointerId);
        } else UI.selectFeature(null);
        return;
      }
      let hit=null;
      for(let i=sc.placements.length-1;i>=0;i--){const pl=sc.placements[i],def=Model.def(pl.defId);
        if(def&&G.pointInPolygon(w,G.footprintWorldPoly(def,pl))){hit=pl;break;}}
      if(UI.mode==="route"){ if(hit) UI.addWaypoint(hit.id,Flow.nearestPort(this.doc,hit,w));
        else UI.addBend(w); return; }
      // select mode: a selected flow exposes its bend points as draggable handles
      if(UI.selectedFlowId){
        const fl=sc.flows.find(f=>f.id===UI.selectedFlowId);
        if(fl){for(let k=0;k<fl.waypoints.length;k++){const wp=fl.waypoints[k];
          if(wp.bend && Math.hypot(wp.bend[0]-w[0],wp.bend[1]-w[1])<10){
            drag={bendFlow:UI.selectedFlowId,bendIdx:k,offX:w[0]-wp.bend[0],offY:w[1]-wp.bend[1]};
            History.dragging=true; host.setPointerCapture(e.pointerId); return;}}}
      }
      // select mode: annotation pins sit on top and are grabbable
      if(UI.showNotes!==false){const anns=sc.annotations||[]; for(let i=anns.length-1;i>=0;i--){const an=anns[i];
        if(Math.hypot(an.position[0]-w[0],an.position[1]-w[1])<12){
          UI.selectAnnotation(an.id);
          drag={annotation:an.id,offX:w[0]-an.position[0],offY:w[1]-an.position[1]};
          History.dragging=true; host.setPointerCapture(e.pointerId); return;}}}
      if(hit){ UI.select(hit.id);
        if(!hit.locked){ drag={id:hit.id,offX:w[0]-hit.position[0],offY:w[1]-hit.position[1]};
          History.dragging=true; host.setPointerCapture(e.pointerId); }
      } else UI.select(null);
    });
    host.addEventListener("pointermove",e=>{
      if(!drag)return;
      const w=this.screenToWorld(e.clientX,e.clientY);
      const sc=this.doc.scenarios.find(s=>s.id===this.doc.activeScenarioId);
      if(drag.svcBendRun){let nx=w[0]-drag.offX, ny=w[1]-drag.offY;
        if(!e.altKey){nx=Math.round(nx); ny=Math.round(ny);}
        UI.moveDustBend(drag.svcBendRun,drag.svcBendIdx,[nx,ny]); return;}
      if(drag.bendFlow){let nx=w[0]-drag.offX, ny=w[1]-drag.offY;
        if(!e.altKey){nx=Math.round(nx); ny=Math.round(ny);}
        UI.moveBend(drag.bendFlow,drag.bendIdx,[nx,ny]); return;}
      if(drag.annotation){const an=(sc.annotations||[]).find(a=>a.id===drag.annotation); if(!an)return;
        let nx=w[0]-drag.offX, ny=w[1]-drag.offY;
        if(!e.altKey){nx=Math.round(nx); ny=Math.round(ny);}
        an.position=[nx,ny]; this.refresh(); return;}
      if(drag.node){const nd=sc.utilityNodes.find(n=>n.id===drag.node); if(!nd)return;
        let nx=w[0]-drag.offX, ny=w[1]-drag.offY;
        if(!e.altKey){nx=Math.round(nx); ny=Math.round(ny);}
        nd.position=[nx,ny]; this.refresh(); return;}
      if(drag.vertex!=null){const V=this.doc.facility.boundary.vertices;
        let nx=w[0]-drag.offX, ny=w[1]-drag.offY;
        if(!e.altKey){nx=Math.round(nx); ny=Math.round(ny);}
        V[drag.vertex]=[nx,ny]; this.refresh(); return;}
      if(drag.feature){const f=this.doc.facility.features.find(x=>x.id===drag.feature); if(!f)return;
        let nx=w[0]-drag.offX, ny=w[1]-drag.offY;
        if(!e.altKey){nx=Math.round(nx); ny=Math.round(ny);}
        f.position=[nx,ny];
        if(!e.altKey && (f.kind==="door"||f.kind==="window")){
          const snap=Feat.wallSnap(this.doc.facility.boundary,[nx,ny],f.kind);
          if(snap){f.position=snap.position;
            if(f.kind==="window")f.facing=snap.facing;
            else {f.swingStart=snap.swingStart; f.swingSweep=snap.swingSweep;}}
        }
        this.refresh(); return;}
      const pl=sc.placements.find(p=>p.id===drag.id); if(!pl)return;
      let nx=w[0]-drag.offX, ny=w[1]-drag.offY;
      if(!e.altKey){nx=Math.round(nx); ny=Math.round(ny);}
      pl.position=[nx,ny]; this.refresh();
    });
    const end=e=>{ if(drag){try{host.releasePointerCapture(e.pointerId);}catch(_){}}
      drag=null; if(History.dragging){History.dragging=false; History.record(UI.doc);} };
    host.addEventListener("pointerup",end);
    host.addEventListener("pointercancel",end);
  }
};

  straightenRun(runId){const sc=Services.scenario(this.doc);

  reassignCircuit(runId,circuitId){Services.assignRunCircuit(this.doc,runId,circuitId); View.refresh();},

  setOutlet(patch){const sc=Services.scenario(this.doc); const nd=(sc.utilityNodes||[]).find(n=>n.id===this.selectedNodeId);

  takeoffText(t,metric){
    const L=ft=> metric? (ft*0.3048).toFixed(1)+" m" : Math.ceil(ft)+" ft";
    const lines=[]; const title=(this.doc.meta.title||"Untitled").toUpperCase();
    lines.push("MATERIALS TAKEOFF \u2014 "+title); lines.push("BAYPLAN FI-075 \u00b7 "+(this.doc.scenarios.find(s=>s.id===this.doc.activeScenarioId)||{}).name); lines.push("");
    if(t.outlets.length){lines.push("OUTLETS"); for(const o of t.outlets) lines.push(`  ${o.voltage}V ${o.amps}A x ${o.count}`); lines.push("");}
    if(t.lights&&t.lights.length){lines.push("LIGHTING"); for(const l of t.lights) lines.push(`  ${l.watts}W ${l.voltage}V fixture x ${l.count}`); lines.push("");}
    if(t.breakers.length){lines.push("BREAKERS"); for(const b of t.breakers) lines.push(`  ${b.amps}A ${b.pole}-pole x ${b.count}`); lines.push("");}
    if(t.wireByGauge.length){lines.push("COPPER CABLE (branch runs, +15% slack)"); for(const w of t.wireByGauge) lines.push(`  ${w.gauge} AWG \u2014 ${L(w.ft)} run, buy ${L(w.buyFt)}`); lines.push("");}
    if(t.duct.length){lines.push("DUST DUCT"); for(const d of t.duct) lines.push(`  ${d.diameter}in \u2014 ${L(d.ft)}, ${d.elbows} elbow(s), ${d.gates} blast gate(s)`); lines.push("");}
    if(t.airRuns){lines.push("COMPRESSED AIR"); lines.push(`  air line \u2014 ${L(t.airFt)}, ${t.airElbows} elbow(s)`); lines.push("");}
    if(t.equipment.length){lines.push("EQUIPMENT"); for(const e of t.equipment) lines.push(`  ${e.item} x ${e.count}`); lines.push("");}
    return lines.join("\n").trim();

      const d=this.doc.meta; const proj=(d.title||"UNTITLED").toUpperCase(); const date=d.date;

    for(const b of document.querySelectorAll("[data-add]")) b.onclick=()=>this.addMachine(b.dataset.add);
    this.bindKeys();
  },
  bindKeys(){
    document.onkeydown=e=>{
      if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA")return;
      if((e.ctrlKey||e.metaKey)&&(e.key==="z"||e.key==="Z")){
        if(e.shiftKey)this.redo(); else this.undo(); e.preventDefault(); return;}
      if((e.ctrlKey||e.metaKey)&&(e.key==="y"||e.key==="Y")){this.redo(); e.preventDefault(); return;}
      if(this.mode==="measure"){
        if(e.key==="Escape")this.exitMeasure();
        else if(e.key==="Backspace"){this.undoMeasurePt(); e.preventDefault();}
        return;
      }
      if(this.mode==="drawwalls"){
        if(e.key==="Enter"){this.finishDrawWalls(); e.preventDefault();}
        else if(e.key==="Escape")this.cancelDrawWalls();
        else if(e.key==="Backspace"){this.undoDraftWall(); e.preventDefault();}
        return;
      }
      if(this.mode==="sounding"){
        if(e.key==="Escape")this.exitSounding();
        else if((e.key==="r"||e.key==="R")&&this.selectedFeatureId){this.rotateFeature(e.shiftKey?-15:15);e.preventDefault();}
        else if((e.key==="Delete"||e.key==="Backspace")){
          if(this.selectedFeatureId)this.removeFeature(this.selectedFeatureId);
          else if(this.selectedVertex!=null)this.removeCorner();
          e.preventDefault();}
        return;
      }
      if(this.mode==="services"){
        if(e.key==="Escape")this.exitServices();
        else if((e.key==="Delete"||e.key==="Backspace")&&this.selectedNodeId){this.removeNode(this.selectedNodeId);e.preventDefault();}
        else if(e.key==="Backspace"&&this.selectedRunId){const sc=Services.scenario(this.doc);
          const run=(sc.utilityRuns||[]).find(r=>r.id===this.selectedRunId);
          if(run&&run.waypoints&&run.waypoints.length){run.waypoints.pop(); if(!run.waypoints.length)delete run.waypoints; View.refresh();}
          e.preventDefault();}
        return;
      }
      if(this.mode==="route"){ if(e.key==="Escape")this.doneRouting();
        else if(e.key==="Backspace"){this.undoWaypoint();e.preventDefault();} return; }
      if(e.key==="Escape"){this.select(null); if(this.selectedAnnotationId){this.selectedAnnotationId=null; View.refresh();} return;}
      if(this.selectedAnnotationId){
        if(e.key==="Delete"||e.key==="Backspace"){this.removeAnnotation(this.selectedAnnotationId);e.preventDefault();}
        return; }
      const pl=this.selected(); if(!pl)return;
      if(e.key==="r"||e.key==="R"){this.rotate(e.shiftKey?-90:90);e.preventDefault();}
      else if(e.key==="m"||e.key==="M"){this.mirror();e.preventDefault();}
      else if(e.key==="l"||e.key==="L"){this.toggleLock();e.preventDefault();}
      else if(e.key==="Delete"||e.key==="Backspace"){this.remove();e.preventDefault();}
      else if(e.key.startsWith("Arrow")&&!pl.locked){
        const g=this.doc.meta.gridSpacing||12;
        const d={ArrowLeft:[-g,0],ArrowRight:[g,0],ArrowUp:[0,g],ArrowDown:[0,-g]}[e.key];
        if(d){pl.position=[pl.position[0]+d[0],pl.position[1]+d[1]];View.refresh();e.preventDefault();}
      }
    };
  },

        for(const b of vw.querySelectorAll("[data-ra]")) b.onclick=()=>this.setOutlet({amps:parseInt(b.dataset.ra,10)});
        for(const b of vw.querySelectorAll("[data-pv]")) b.onclick=()=>this.setNodePower({voltage:parseInt(b.dataset.pv,10)});
        const paIn=vw.querySelector("[data-pa]"); if(paIn)paIn.onchange=()=>this.setNodePower({amps:Math.max(1,parseInt(paIn.value,10)||1)});
        const lwIn=vw.querySelector("[data-lw]"); if(lwIn)lwIn.onchange=()=>this.setNodePower({watts:Math.max(1,parseInt(lwIn.value,10)||1)});
        const st=vw.querySelector('[data-sv="straighten"]'); if(st)st.onclick=()=>this.straightenRun(this.selectedRunId);
        for(const b of vw.querySelectorAll("[data-ckassign]")) b.onclick=()=>{const cid=b.dataset.ckassign;

        const dn=vw.querySelector('[data-sv="delnode"]'); if(dn)dn.onclick=()=>this.removeNode(this.selectedNodeId);

        const tally = (svc.errors||svc.warnings)
          ? `<span style="color:${svc.errors?'var(--hard)':'var(--soft)'}">${svc.errors} error${svc.errors!==1?'s':''} \u00b7 ${svc.warnings} warning${svc.warnings!==1?'s':''}</span>`

          <p style="font-size:12.5px; margin:0 0 8px">${tally}</p>
          <button data-sv="enter" style="width:100%">Open utilities</button>`;
        vw.querySelector('[data-sv="enter"]').onclick=()=>this.enterServices();
      }

    // SOUNDING panel
    const measWrap=document.getElementById("measWrap");
    if(measWrap){
      if(this.mode==="measure"){
        const mp=this.measurePts||[]; const total=this.measureTotal();

          <div style="font-family:var(--font-mono); font-size:12.5px; line-height:1.7; margin:2px 0 8px">
            total <b style="color:var(--brass)">${mp.length>1?View.fmtLen(total):'\u2014'}</b><br>
            <span style="color:var(--ink-dim); font-size:11px">${mp.length} point${mp.length!==1?'s':''}${last?` \u00b7 last leg ${last}`:''}</span>
          </div>
          <p class="empty" style="margin:0 0 8px">Click to drop points along what you want to measure. Backspace removes the last point.</p>
          <div class="row" style="display:flex; gap:6px">
            <button data-me="undo" style="flex:1" ${mp.length?'':'disabled'}>Undo point</button>
            <button data-me="clear" style="flex:1" ${mp.length?'':'disabled'}>Clear</button>
          </div>
          <button data-me="exit" style="width:100%;margin-top:8px">Done</button>`;
        const u=measWrap.querySelector('[data-me="undo"]'); if(u&&!u.disabled)u.onclick=()=>this.undoMeasurePt();
        const c=measWrap.querySelector('[data-me="clear"]'); if(c&&!c.disabled)c.onclick=()=>this.clearMeasure();
        measWrap.querySelector('[data-me="exit"]').onclick=()=>this.exitMeasure();
      } else measWrap.innerHTML="";
    }
    const soundWrap=document.getElementById("soundWrap");
    if(soundWrap){
      const fac=this.doc.facility; const fb=G.bounds(fac.boundary);
      const w=Math.round(fb.maxX-fb.minX), h=Math.round(fb.maxY-fb.minY);
      const feats=fac.features||[];
      if(this.mode==="drawwalls"){
        const n=(this.draftWalls||[]).length;
        soundWrap.innerHTML=`<h2>Draw walls</h2>
          <p class="empty" style="margin:0 0 8px">Click to drop corners, in order, around the room. Angled walls are fine. Click the first corner (or Finish) to close. ${n} placed.</p>
          <div class="row" style="display:flex; gap:6px">
            <button data-so="finish" style="flex:1" ${n>=3?'':'disabled'}>Finish</button>
            <button data-so="undopt" style="flex:1" ${n?'':'disabled'}>Undo point</button>
          </div>
          <button data-so="cancel" style="width:100%;margin-top:8px">Cancel</button>`;
        const fb2=soundWrap.querySelector('[data-so="finish"]'); if(fb2&&!fb2.disabled)fb2.onclick=()=>this.finishDrawWalls();
        const up=soundWrap.querySelector('[data-so="undopt"]'); if(up&&!up.disabled)up.onclick=()=>this.undoDraftWall();
        soundWrap.querySelector('[data-so="cancel"]').onclick=()=>this.cancelDrawWalls();
      } else if(this.mode==="sounding"){
        const selF=feats.find(f=>f.id===this.selectedFeatureId);
        const canRemoveCorner=this.selectedVertex!=null&&fac.boundary.vertices.length>3;
        soundWrap.innerHTML=`<h2>Room</h2>
          <div class="row" style="display:flex; gap:6px; align-items:center; flex-wrap:wrap">
            <input id="rw" type="number" value="${View.uSize(w).v}" style="width:66px" aria-label="width">
            <span style="color:var(--ink-dim)">\u00d7</span>
            <input id="rh" type="number" value="${View.uSize(h).v}" style="width:66px" aria-label="depth">
            <button data-so="rect">Set ${View.uSize(w).u}</button>
          </div>
          <div class="row" style="display:flex; gap:6px; margin-top:6px">
            <button data-so="addc" style="flex:1">Add corner</button>
            <button data-so="delc" style="flex:1" ${canRemoveCorner?'':'disabled'}>Remove corner</button>
          </div>
          <div class="row" style="margin-top:6px">
            <button data-so="draw" style="width:100%">Draw walls from scratch</button>
          </div>
          <h2 style="margin-top:16px">Features</h2>
          <div class="row" style="display:flex; gap:6px; flex-wrap:wrap">
            <button data-so="col" style="flex:1;min-width:70px">+ Column</button>
            <button data-so="door" style="flex:1;min-width:70px">+ Door</button>
            <button data-so="win" style="flex:1;min-width:70px">+ Window</button>
          </div>
          ${selF?`<div class="selpanel" style="margin-top:8px">
            <div class="name">${selF.kind==="door"?"Door":selF.kind==="window"?"Window":"Column"}</div>
            ${(selF.kind==="door"||selF.kind==="window")?`<div class="row"><button data-so="rotL">\u21b6 15</button><button data-so="rotR">15 \u21b7</button></div>`:``}
            <div class="row" style="margin-top:6px"><button data-so="delf" class="danger" style="width:100%">Remove</button></div>
          </div>`:`<p class="empty" style="margin-top:8px">Drag corners to reshape the room. Add columns, doors, and windows, then drag them into place. Door swings and columns check against your machines.</p>`}
          <button data-so="exit" style="width:100%;margin-top:10px">Done</button>`;
        soundWrap.querySelector('[data-so="rect"]').onclick=()=>this.setRoom(View.uToInches(+soundWrap.querySelector("#rw").value),View.uToInches(+soundWrap.querySelector("#rh").value));
        soundWrap.querySelector('[data-so="addc"]').onclick=()=>this.addCorner();
        const dc=soundWrap.querySelector('[data-so="delc"]'); if(dc&&!dc.disabled)dc.onclick=()=>this.removeCorner();
        soundWrap.querySelector('[data-so="draw"]').onclick=()=>this.startDrawWalls();
        soundWrap.querySelector('[data-so="col"]').onclick=()=>this.addFeature("column");
        soundWrap.querySelector('[data-so="door"]').onclick=()=>this.addFeature("door");
        soundWrap.querySelector('[data-so="win"]').onclick=()=>this.addFeature("window");
        soundWrap.querySelector('[data-so="exit"]').onclick=()=>this.exitSounding();
        const rl=soundWrap.querySelector('[data-so="rotL"]'); if(rl)rl.onclick=()=>this.rotateFeature(-15);
        const rr=soundWrap.querySelector('[data-so="rotR"]'); if(rr)rr.onclick=()=>this.rotateFeature(15);
        const df=soundWrap.querySelector('[data-so="delf"]'); if(df)df.onclick=()=>this.removeFeature(this.selectedFeatureId);
      } else {
        const doors=feats.filter(f=>f.kind==="door").length, cols=feats.filter(f=>f.kind==="column").length, wins=feats.filter(f=>f.kind==="window").length;
        soundWrap.innerHTML=`<h2>Room</h2>
          <p style="font-size:12.5px; margin:0 0 8px; color:var(--ink-dim)">${w} \u00d7 ${h} in \u00b7 ${fac.boundary.vertices.length} corners${feats.length?` \u00b7 ${cols}c ${doors}d ${wins}w`:``}</p>
          <button data-so="enter" style="width:100%">Edit room</button>`;
        soundWrap.querySelector('[data-so="enter"]').onclick=()=>this.enterSounding();
      }

    const mh=document.getElementById("modeHint");
    if(mh) mh.textContent = this.mode==="route"
      ? "routing: click machines in order \u00b7 click empty floor for a bend \u00b7 Esc or Done to finish"
      : this.mode==="measure"
      ? "measure: click points to lay a tape \u00b7 Backspace removes the last \u00b7 Esc to finish"
      : this.mode==="services"
      ? "utilities: drag nodes \u00b7 click a run to select \u00b7 click along a dust run to add a bend \u00b7 Esc to finish"
      : this.mode==="drawwalls"
      ? "draw walls: click corners in order \u00b7 click the first to close \u00b7 Enter finish \u00b7 Esc cancel"
      : this.mode==="sounding"
      ? "room: drag corners and features \u00b7 add via the panel \u00b7 Esc to finish"
      : "drag to move \u00b7 R rotate \u00b7 M mirror \u00b7 Del remove";
    const ub=document.getElementById("undoBtn"), rdb=document.getElementById("redoBtn");
    if(ub)ub.disabled=!History.canUndo();
    if(rdb)rdb.disabled=!History.canRedo();
  }
};

/* ---- tests ---- */
const Tests = {
  results:[], ok(n,c,d=""){this.results.push({name:n,pass:!!c,detail:d});},
  approx(a,b,e=1e-6){return Math.abs(a-b)<=e;},
  run(){
    const R=this.results; R.length=0; const lib=SEED.library;
    this.ok("seed: library non-empty",lib.length>0,lib.length+" machines");
    let schemaOK=true,badFp=0,sev=new Set(),shapes=new Set();
    for(const m of lib){ if(!m.id||!m.name||!m.category||!m.footprint||!Array.isArray(m.clearances))schemaOK=false;
      if(!m.footprint||m.footprint.vertices.length!==4)badFp++;
      for(const z of m.clearances){sev.add(z.severity);shapes.add(z.shape);} }
    this.ok("seed: required fields",schemaOK);
    this.ok("seed: 4-vertex footprints",badFp===0,badFp+" bad");
    this.ok("seed: hard/soft/shared present",sev.has("hard")&&sev.has("soft")&&sev.has("shared"),[...sev].join(","));
    this.ok("seed: arc primitive present",shapes.has("arc"));
    const saw=lib.find(m=>m.id==="builtin-table-saw-cabinet"); const b=G.bounds(saw.footprint);
    this.ok("bounds: offset anchor",b.minX===-14&&b.maxX===30&&b.minY===-13&&b.maxY===14,JSON.stringify(b));
    const rb={minX:-10,minY:-10,maxX:10,maxY:10};
    this.ok("rectOffEdge: front below minY",G.rectOffEdge(rb,"front",5).some(p=>p[1]===-15));
    this.ok("rectOffEdge: right beyond maxX",G.rectOffEdge(rb,"right",5).some(p=>p[0]===15));
    const sq=[[0,0],[10,0],[10,10],[0,10]];
    this.ok("pointInPolygon: in",G.pointInPolygon([5,5],sq));
    this.ok("pointInPolygon: out",!G.pointInPolygon([15,5],sq));
    this.ok("bearing: +x=90",this.approx(G.bearing(0,0,1,0),90));
    this.ok("bearing: -y=180",this.approx(G.bearing(0,0,0,-1),180));
    const lathe=lib.find(m=>m.id==="builtin-wood-lathe"); const swing=lathe.clearances.find(z=>z.shape==="arc").geometry;
    this.ok("pointInArc: front-left inside",G.pointInArc([-7,-7],swing),"bearing "+G.bearing(0,0,-7,-7).toFixed(0));
    this.ok("pointInArc: front-right outside",!G.pointInArc([7,-7],swing));
    this.ok("pointInArc: beyond radius",!G.pointInArc([-20,-20],swing));
    const ma=G.mirrorArc({center:[0,0],radius:20,startAngle:180,sweep:90});
    this.ok("mirrorArc: 180->90",ma.startAngle===90&&ma.sweep===90,ma.startAngle+"/"+ma.sweep);
    this.ok("mirrorArc: catches front-right",G.pointInArc([7,-7],ma)&&!G.pointInArc([-7,-7],ma));
    const w=G.toWorld([0,1],{position:[0,0],rotation:90,mirrored:false});
    this.ok("toWorld: +y rot90 CW -> +x",this.approx(w[0],1)&&this.approx(w[1],0),`(${w[0].toFixed(2)},${w[1].toFixed(2)})`);
    this.ok("toWorld: mirror flips x",(()=>{const m=G.toWorld([1,0],{position:[0,0],rotation:0,mirrored:true});return this.approx(m[0],-1)&&this.approx(m[1],0);})());
    this.ok("segIntersect: crossing",G.segIntersect([0,0],[10,10],[0,10],[10,0]));
    this.ok("segIntersect: parallel none",!G.segIntersect([0,0],[10,0],[0,5],[10,5]));
    this.ok("polysOverlap: overlapping",G.polysOverlap([[0,0],[10,0],[10,10],[0,10]],[[5,5],[15,5],[15,15],[5,15]]));
    this.ok("polysOverlap: disjoint",!G.polysOverlap([[0,0],[4,0],[4,4],[0,4]],[[10,10],[14,10],[14,14],[10,14]]));
    this.ok("polysOverlap: containment",G.polysOverlap([[0,0],[20,0],[20,20],[0,20]],[[8,8],[12,8],[12,12],[8,12]]));
    this.ok("TRIM: footprint x footprint = error",Trim.interaction("footprint","footprint")==="error");
    this.ok("TRIM: hard x footprint = error",Trim.interaction("hard","footprint")==="error");
    this.ok("TRIM: hard x shared = error",Trim.interaction("shared","hard")==="error");
    this.ok("TRIM: soft x soft = warning",Trim.interaction("soft","soft")==="warning");
    this.ok("TRIM: shared x shared = ok",Trim.interaction("shared","shared")==="ok");
    this.ok("TRIM: shared x soft = ok",Trim.interaction("shared","soft")==="ok");
    this.ok("TRIM: hard x soft = warning",Trim.interaction("hard","soft")==="warning");
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-table-saw-cabinet",position:[140,110],rotation:0,mirrored:false},
      {id:"b",defId:"builtin-table-saw-cabinet",position:[150,110],rotation:0,mirrored:false}];
      this.ok("TRIM: overlapping saws report error",Trim.compute(d).errors>0);})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-table-saw-cabinet",position:[5,5],rotation:0,mirrored:false}];
      this.ok("TRIM: out-of-bounds flags error",Trim.compute(d).errors>0);})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-drill-press",position:[144,108],rotation:0,mirrored:false}];
      const c=Trim.compute(d); this.ok("TRIM: lone centered machine clear",c.errors===0&&c.warnings===0);})();
    // TRIM minHeight (vertical bands)
    this.ok("TRIM: low body clears a high feed lane band",!Trim.vOverlap({lo:0,hi:16},{lo:40,hi:108}));
    this.ok("TRIM: tall body intrudes a feed lane band",Trim.vOverlap({lo:0,hi:66},{lo:40,hi:108}));
    this.ok("TRIM: any body meets a full-height operator band",Trim.vOverlap({lo:0,hi:16},{lo:0,hi:108}));
    (()=>{const d=Model.emptyFacility(); d.facility.boundary.vertices=[[0,0],[600,0],[600,600],[0,600]];
      d.scenarios[0].placements=[
        {id:"a",defId:"builtin-table-saw-cabinet",position:[300,260],rotation:0,mirrored:false},
        {id:"b",defId:"builtin-table-saw-cabinet",position:[300,330],rotation:0,mirrored:false}];
      const c=Trim.compute(d);
      this.ok("TRIM: two short saws in line, feed-lane-over-body suppressed by height",c.errors===0&&c.warnings===0,c.errors+"e/"+c.warnings+"w");})();
    (()=>{const d=Model.emptyFacility(); d.facility.boundary.vertices=[[0,0],[600,0],[600,600],[0,600]];
      d.scenarios[0].placements=[
        {id:"a",defId:"builtin-table-saw-cabinet",position:[300,260],rotation:0,mirrored:false},
        {id:"b",defId:"builtin-drill-press",position:[300,330],rotation:0,mirrored:false}];
      const c=Trim.compute(d);
      this.ok("TRIM: a tall drill press in the same feed lane is flagged",c.warnings>=1,c.warnings+" warnings");})();
    // ROUTING
    (()=>{const s=lib.find(m=>m.id==="builtin-table-saw-cabinet");
      this.ok("ROUTING: seed machines carry work points", (s.ports||[]).length>0, (s.ports||[]).length+" ports on saw");})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-jointer-8in",position:[100,100],rotation:0,mirrored:false}];
      const pl=d.scenarios[0].placements[0];
      const near=Flow.nearestPort(d,pl,G.toWorld([36,0],pl)); // near stock_out (right)
      this.ok("ROUTING: nearestPort snaps to closest work point",near==="out",near);})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-jointer-8in",position:[60,100],rotation:0,mirrored:false},
      {id:"b",defId:"builtin-table-saw-cabinet",position:[200,100],rotation:0,mirrored:false}];
      const fl={id:"f",name:"F",waypoints:[{placementId:"a",portId:"out"},{placementId:"b",portId:"in"}],color:"#000"};
      const m=Flow.metrics(d,fl);
      this.ok("ROUTING: metric distance is positive",m.distanceIn>0,m.feet.toFixed(1)+" ft");
      this.ok("ROUTING: straight run has no backtrack",m.backtracks===0);})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-drill-press",position:[60,100],rotation:0,mirrored:false},
      {id:"b",defId:"builtin-drill-press",position:[260,100],rotation:0,mirrored:false},
      {id:"c",defId:"builtin-drill-press",position:[160,100],rotation:0,mirrored:false},
      {id:"e",defId:"builtin-drill-press",position:[360,100],rotation:0,mirrored:false}];
      // net travel is left-to-right; the b->c leg doubles back and should count as a backtrack
      const fl={id:"f",name:"F",color:"#000",waypoints:[{placementId:"a"},{placementId:"b"},{placementId:"c"},{placementId:"e"}]};
      const m=Flow.metrics(d,fl);
      this.ok("ROUTING: a reverse leg counts as backtrack",m.backtracks===1,m.backtracks+" backtracks");})();
    (()=>{const d=Model.emptyFacility();
      const fl={id:"f",name:"F",color:"#000",waypoints:[{bend:[0,0]},{bend:[60,60]},{bend:[120,0]}]};
      const m=Flow.metrics(d,fl);
      this.ok("ROUTING: free bend points route the path",m.points.length===3&&m.distanceIn>160);})();
    (()=>{const d=Model.emptyFacility();
      const loop={id:"f",name:"F",color:"#000",waypoints:[{bend:[0,0]},{bend:[100,0]},{bend:[100,100]},{bend:[0,100]},{bend:[0,0]}]};
      const m=Flow.metrics(d,loop);
      this.ok("ROUTING: a clean loop is flagged as looped with no backtracks",m.looped&&m.backtracks===0,m.backtracks+" back");})();
    (()=>{const d=Model.emptyFacility();
      const jog={id:"f",name:"F",color:"#000",waypoints:[{bend:[0,0]},{bend:[100,0]},{bend:[50,0]},{bend:[50,100]},{bend:[0,100]},{bend:[0,0]}]};
      const m=Flow.metrics(d,jog);
      this.ok("ROUTING: a loop that doubles back reports a backtrack",m.looped&&m.backtracks>=1,m.backtracks+" back");})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-jointer-8in",position:[60,60],rotation:0,mirrored:false},
      {id:"b",defId:"builtin-jointer-8in",position:[200,200],rotation:0,mirrored:false},
      {id:"c",defId:"builtin-jointer-8in",position:[60,200],rotation:0,mirrored:false},
      {id:"e",defId:"builtin-jointer-8in",position:[200,60],rotation:0,mirrored:false}];
      d.scenarios[0].flows=[
        {id:"f1",name:"F1",color:"#000",waypoints:[{placementId:"a"},{placementId:"b"}]},
        {id:"f2",name:"F2",color:"#111",waypoints:[{placementId:"c"},{placementId:"e"}]}];
      this.ok("ROUTING: crossing flows are detected",Flow.crossings(d)>0,Flow.crossings(d)+" crossings");})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-jointer-8in",position:[60,60],rotation:0,mirrored:false},
      {id:"b",defId:"builtin-jointer-8in",position:[200,60],rotation:0,mirrored:false},
      {id:"c",defId:"builtin-jointer-8in",position:[60,200],rotation:0,mirrored:false},
      {id:"e",defId:"builtin-jointer-8in",position:[200,200],rotation:0,mirrored:false}];
      d.scenarios[0].flows=[
        {id:"f1",name:"F1",color:"#000",waypoints:[{placementId:"a"},{placementId:"b"}]},
        {id:"f2",name:"F2",color:"#111",waypoints:[{placementId:"c"},{placementId:"e"}]}];
      this.ok("ROUTING: parallel flows do not cross",Flow.crossings(d)===0);})();
    (()=>{const d=Model.emptyFacility(); const fl=Model.addFlow(d);
      this.ok("ROUTING: addFlow assigns a color and id",!!fl.color&&!!fl.id);})();
    // SERVICES
    this.ok("SERVICES: 90deg elbow equiv scales with diameter",
      Services.elbow90(6)>Services.elbow90(4), Services.elbow90(4)+"->"+Services.elbow90(6)+" ft");
    this.ok("SERVICES: straight duct has no elbow equivalent",

      this.ok("SOUNDING: moving the column away clears it",Trim.compute(d).errors===0);})();
    (()=>{const d=Model.emptyFacility();
      d.scenarios[0].placements=[{id:"a",defId:"builtin-drill-press",position:[100,100],rotation:0,mirrored:false}];
      const dr=Model.addFeature(d,"door"); dr.position=[100,80]; dr.width=40; dr.swingStart=270; dr.swingSweep=90;
      this.ok("SOUNDING: a door swing over a machine is flagged",Trim.compute(d).errors>0||Trim.compute(d).warnings>0);
      dr.position=[20,220];
      const c=Trim.compute(d); this.ok("SOUNDING: moving the door away clears it",c.errors===0&&c.warnings===0);})();
    (()=>{const d=Model.emptyFacility();
      d.scenarios[0].placements=[{id:"a",defId:"builtin-table-saw-cabinet",position:[150,120],rotation:0,mirrored:false}];
      Model.addFeature(d,"window"); d.facility.features[0].position=[150,120];
      this.ok("SOUNDING: a window does not constrain placement",Trim.compute(d).errors===0&&Trim.compute(d).warnings===0);})();
    (()=>{const d=Model.emptyFacility();
      Model.setBoundary(d,[[0,0],[300,0],[300,120],[150,200],[0,120]]); // angled/pentagon room
      this.ok("SOUNDING: free-form boundary accepts an angled polygon",d.facility.boundary.vertices.length===5);
      d.scenarios[0].placements=[{id:"a",defId:"builtin-drill-press",position:[150,190],rotation:0,mirrored:false}];
      this.ok("SOUNDING: containment respects angled walls",Trim.compute(d).records.some(r=>/past the walls/.test(r.text)));})();
    (()=>{const b={vertices:[[0,0],[300,0],[300,200],[0,200]]};
      const nw=Feat.nearestWall(b,[150,10]);
      this.ok("SOUNDING: nearestWall finds the closest edge",nw.i===0&&Math.abs(nw.point[1])<0.001);
      const win=Feat.wallSnap(b,[150,12],"window");
      this.ok("SOUNDING: a window snaps onto the wall",win&&win.position[1]===0);
      this.ok("SOUNDING: a snapped window aligns to the wall bearing",Math.abs(win.facing-90)<0.001);
      const dr=Feat.wallSnap(b,[150,12],"door");
      const swing=Feat.doorSwingPoly({position:dr.position,width:32,swingStart:dr.swingStart,swingSweep:dr.swingSweep});
      this.ok("SOUNDING: a snapped door swings into the room",dr.swingSweep===90&&swing.some(p=>G.pointInPolygon(p,b.vertices)));
      this.ok("SOUNDING: features far from any wall do not snap",Feat.wallSnap(b,[150,100],"window")===null);})();
    // HISTORY (undo/redo)
    (()=>{const h=History; const save={states:h.states,idx:h.idx,suspend:h.suspend,dragging:h.dragging};
      h.reset(); h.suspend=false; h.dragging=false;
      const d=Model.emptyFacility();
      h.record(d); // baseline
      this.ok("HISTORY: baseline recorded, nothing to undo yet",!h.canUndo());
      d.scenarios[0].placements.push({id:"a",defId:"builtin-drill-press",position:[100,100],rotation:0,mirrored:false});
      h.record(d);
      this.ok("HISTORY: an edit becomes undoable",h.canUndo());
      const back=h.undo();
      this.ok("HISTORY: undo restores the prior state",back.scenarios[0].placements.length===0);
      this.ok("HISTORY: after undo, redo is available",h.canRedo());
      const fwd=h.redo();
      this.ok("HISTORY: redo re-applies the edit",fwd.scenarios[0].placements.length===1);
      // no-op dedupe: recording the same state twice does not add a step
      const before=h.states.length; h.record(fwd); h.record(fwd);
      this.ok("HISTORY: identical states are deduped",h.states.length===before);
      // dragging suspends recording
      h.dragging=true; const n=h.states.length;
      const d2=JSON.parse(JSON.stringify(fwd)); d2.scenarios[0].placements[0].position=[200,200]; h.record(d2);
      this.ok("HISTORY: no snapshot recorded mid-drag",h.states.length===n);
      h.dragging=false;
      // library is stripped from snapshots
      this.ok("HISTORY: snapshots omit the bundled library",h.snapshot(fwd).indexOf('builtin-table-saw')===-1);
      this.ok("HISTORY: restore re-attaches the library",h.restore(h.snapshot(fwd)).library===SEED.library);
      Object.assign(h,save);})();
    // MEASURE + rulers
    this.ok("MEASURE: length formats as feet and inches",View.fmtLen(30)==="2' 6\""&&View.fmtLen(24)==="2'"&&View.fmtLen(7)==='7"');
    (()=>{const save=UI.measurePts; try{UI.measurePts=[[0,0],[30,0],[30,40]];
      this.ok("MEASURE: total sums the legs",Math.round(UI.measureTotal())===70,UI.measureTotal()+"in");
      UI.measurePts.pop();
      this.ok("MEASURE: backtrack drops the last leg",Math.round(UI.measureTotal())===30);
    } finally {UI.measurePts=save;}})();
    // INTERACTION: a drag must survive the redraw that selection triggers (pointer listeners live on the stable container)
    (()=>{const savedEl=View.el, savedSync=UI.syncPanels, savedMode=UI.mode, savedDoc=UI.doc, savedSel=UI.selectedId;
      try{
        UI.syncPanels=function(){};
        // fake svg with a realistic letterboxed bounding rect (offset + scale != 1) to exercise the mapping
        const RECT={left:37,top:19,width:0,height:0,scale:2};
        const svgEl={getBoundingClientRect(){const b=View._b,p=View.pad;
          const vbW=(b.maxX-b.minX)+p*2, vbH=(b.maxY-b.minY)+p*2;
          return {left:RECT.left,top:RECT.top,width:vbW*RECT.scale + 80, height:vbH*RECT.scale + 40};}};
        const H={};
        const host={style:{},set innerHTML(v){},get innerHTML(){return "";},
          querySelector(){return svgEl;},addEventListener(t,fn){H[t]=fn;},setPointerCapture(){},releasePointerCapture(){}};
        View.mount(host);
        const d=Model.emptyFacility();
        d.scenarios[0].placements=[{id:"z",defId:"builtin-drill-press",position:[100,100],rotation:0,mirrored:false}];
        UI.mode="select"; UI.selectedId=null; UI.doc=d; History.reset(); View.scene(d);
        // client coords for a world point, matching the fake rect's letterbox+scale
        const toClient=(wpt)=>{const s=View.toScreen(wpt); const b=View._b,p=View.pad;
          const vbW=(b.maxX-b.minX)+p*2, vbH=(b.maxY-b.minY)+p*2;
          const r=svgEl.getBoundingClientRect(); const sc=Math.min(r.width/vbW,r.height/vbH);
          const offX=(r.width-vbW*sc)/2, offY=(r.height-vbH*sc)/2;
          return [r.left+offX+s[0]*sc, r.top+offY+s[1]*sc];};
        const p0=toClient([100,100]);
        H.pointerdown({clientX:p0[0],clientY:p0[1],pointerId:9,altKey:false,button:0,preventDefault(){}});
        const p1=toClient([140,80]);
        H.pointermove({clientX:p1[0],clientY:p1[1],pointerId:9,altKey:false});
        H.pointerup({pointerId:9});
        const p=d.scenarios[0].placements[0].position;
        this.ok("INTERACTION: a drag maps through a letterboxed viewport and survives the select redraw",p[0]===140&&p[1]===80,p.join(","));
      } finally { UI.syncPanels=savedSync; UI.mode=savedMode; UI.doc=savedDoc; UI.selectedId=savedSel; if(savedEl)View.mount(savedEl); }
    })();
    this.paint();
  },
  paint(){
    const pass=this.results.filter(r=>r.pass).length,total=this.results.length;
    const rows=this.results.map(r=>`<tr><td class="${r.pass?'t-pass':'t-fail'}">${r.pass?'PASS':'FAIL'}</td><td>${r.name}</td><td style="color:var(--ink-dim)">${r.detail||""}</td></tr>`).join("");
    document.getElementById("app").innerHTML=`<div id="tests">
      <h1>BAYPLAN \u00b7 full test harness (SOUNDING \u00b7 TRIM \u00b7 ROUTING \u00b7 SERVICES \u00b7 PLAT \u00b7 history)</h1>
      <div class="summary ${pass===total?'t-pass':'t-fail'}">${pass} / ${total} passing${pass===total?"  \u00b7 release gate green":"  \u00b7 gate RED"}</div>
      <table><tbody>${rows}</tbody></table>
      <p style="margin-top:18px"><a href="#" onclick="location.hash='';location.reload()">\u2190 back to plat</a></p></div>`;
    document.documentElement.setAttribute("data-theme","night");
  }
};

window.addEventListener("DOMContentLoaded",()=>UI.boot());
window.addEventListener("hashchange",()=>location.reload());
</script>
</body>
