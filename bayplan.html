          ? `<ul class="trim" style="margin-top:8px">${svc.records.map(r=>`<li><span class="badge ${r.sev==='error'?'err':'warn'}">${r.sev==='error'?'ERR':'WARN'}</span> ${r.text}</li>`).join("")}</ul>`
          : (sc.utilityRuns.length?`<p class="trim clear-msg" style="margin-top:8px">Utilities check clean.</p>`:``);
        vw.innerHTML=`<h2>Utilities</h2>
          <div class="row" style="display:flex; gap:6px; flex-wrap:wrap">
            <button data-sv="collector" style="flex:1;min-width:110px">+ Collector</button>
            <button data-sv="panel" style="flex:1;min-width:110px">+ Panel</button>
          </div>
          <div class="row" style="display:flex; gap:6px; margin-top:6px">
            <button data-sv="wire" style="flex:1" ${(collectors||panels)?'':'disabled'}>Wire all</button>
            <button data-sv="clear" style="flex:1" ${sc.utilityRuns.length?'':'disabled'}>Clear runs</button>
          </div>
          <div style="margin-top:8px; font-family:var(--font-mono); font-size:10.5px; color:var(--ink-dim); line-height:1.6">
            dust runs ${svc.dustRunCount} \u00b7 longest ${svc.longestDustFt.toFixed(0)} ft eff.<br>
            load ${svc.load120.toFixed(0)}A @120V \u00b7 ${svc.load240.toFixed(0)}A @240V
          </div>
          ${recBody}
          ${selN?`<button data-sv="delnode" class="danger" style="width:100%;margin-top:8px">Remove ${selN.label}</button>`:``}
          <button data-sv="exit" style="width:100%;margin-top:8px">Done</button>`;
        vw.querySelector('[data-sv="collector"]').onclick=()=>this.addNode("dust_collector");
        vw.querySelector('[data-sv="panel"]').onclick=()=>this.addNode("panel");
        vw.querySelector('[data-sv="wire"]').onclick=()=>this.wireAll();
        vw.querySelector('[data-sv="clear"]').onclick=()=>this.clearRuns();
        vw.querySelector('[data-sv="exit"]').onclick=()=>this.exitServices();
        const dn=vw.querySelector('[data-sv="delnode"]'); if(dn)dn.onclick=()=>this.removeNode(this.selectedNodeId);
      } else {
        const tally = (svc.errors||svc.warnings)
          ? `<span style="color:${svc.errors?'var(--hard)':'var(--soft)'}">${svc.errors} error${svc.errors!==1?'s':''} \u00b7 ${svc.warnings} warning${svc.warnings!==1?'s':''}</span>`
          : (nodes.length?`<span class="trim clear-msg">clean</span>`:`<span class="empty">not wired</span>`);
        vw.innerHTML=`<h2>Utilities</h2>
          <p style="font-size:12.5px; margin:0 0 8px">${tally}</p>
          <button data-sv="enter" style="width:100%">Open utilities</button>`;
        vw.querySelector('[data-sv="enter"]').onclick=()=>this.enterServices();
      }
    }
    // SOUNDING panel
    const soundWrap=document.getElementById("soundWrap");
    if(soundWrap){
      const fac=this.doc.facility; const fb=G.bounds(fac.boundary);
      const w=Math.round(fb.maxX-fb.minX), h=Math.round(fb.maxY-fb.minY);
      const feats=fac.features||[];
      if(this.mode==="sounding"){
        const selF=feats.find(f=>f.id===this.selectedFeatureId);
        const canRemoveCorner=this.selectedVertex!=null&&fac.boundary.vertices.length>3;
        soundWrap.innerHTML=`<h2>Room</h2>
          <div class="row" style="display:flex; gap:6px; align-items:center; flex-wrap:wrap">
            <input id="rw" type="number" value="${w}" style="width:66px" aria-label="width inches">
            <span style="color:var(--ink-dim)">\u00d7</span>
            <input id="rh" type="number" value="${h}" style="width:66px" aria-label="depth inches">
            <button data-so="rect">Set in</button>
          </div>
          <div class="row" style="display:flex; gap:6px; margin-top:6px">
            <button data-so="addc" style="flex:1">Add corner</button>
            <button data-so="delc" style="flex:1" ${canRemoveCorner?'':'disabled'}>Remove corner</button>
          </div>
          <h2 style="margin-top:16px">Features</h2>
          <div class="row" style="display:flex; gap:6px; flex-wrap:wrap">
            <button data-so="col" style="flex:1;min-width:70px">+ Column</button>
            <button data-so="door" style="flex:1;min-width:70px">+ Door</button>
            <button data-so="win" style="flex:1;min-width:70px">+ Window</button>
          </div>
          ${selF?`<div class="selpanel" style="margin-top:8px">
            <div class="name">${selF.kind==="door"?"Door":selF.kind==="window"?"Window":"Column"}</div>
            ${(selF.kind==="door"||selF.kind==="window")?`<div class="row"><button data-so="rotL">\u21b6 15</button><button data-so="rotR">15 \u21b7</button></div>`:``}
            <div class="row" style="margin-top:6px"><button data-so="delf" class="danger" style="width:100%">Remove</button></div>
          </div>`:`<p class="empty" style="margin-top:8px">Drag corners to reshape the room. Add columns, doors, and windows, then drag them into place. Door swings and columns check against your machines.</p>`}
          <button data-so="exit" style="width:100%;margin-top:10px">Done</button>`;
        soundWrap.querySelector('[data-so="rect"]').onclick=()=>this.setRoom(+soundWrap.querySelector("#rw").value,+soundWrap.querySelector("#rh").value);
        soundWrap.querySelector('[data-so="addc"]').onclick=()=>this.addCorner();
        const dc=soundWrap.querySelector('[data-so="delc"]'); if(dc&&!dc.disabled)dc.onclick=()=>this.removeCorner();
        soundWrap.querySelector('[data-so="col"]').onclick=()=>this.addFeature("column");
        soundWrap.querySelector('[data-so="door"]').onclick=()=>this.addFeature("door");
        soundWrap.querySelector('[data-so="win"]').onclick=()=>this.addFeature("window");
        soundWrap.querySelector('[data-so="exit"]').onclick=()=>this.exitSounding();
        const rl=soundWrap.querySelector('[data-so="rotL"]'); if(rl)rl.onclick=()=>this.rotateFeature(-15);
        const rr=soundWrap.querySelector('[data-so="rotR"]'); if(rr)rr.onclick=()=>this.rotateFeature(15);
        const df=soundWrap.querySelector('[data-so="delf"]'); if(df)df.onclick=()=>this.removeFeature(this.selectedFeatureId);
      } else {
        const doors=feats.filter(f=>f.kind==="door").length, cols=feats.filter(f=>f.kind==="column").length, wins=feats.filter(f=>f.kind==="window").length;
        soundWrap.innerHTML=`<h2>Room</h2>
          <p style="font-size:12.5px; margin:0 0 8px; color:var(--ink-dim)">${w} \u00d7 ${h} in \u00b7 ${fac.boundary.vertices.length} corners${feats.length?` \u00b7 ${cols}c ${doors}d ${wins}w`:``}</p>
          <button data-so="enter" style="width:100%">Edit room</button>`;
        soundWrap.querySelector('[data-so="enter"]').onclick=()=>this.enterSounding();
      }
    }
    const mh=document.getElementById("modeHint");
    if(mh) mh.textContent = this.mode==="route"
      ? "routing: click machines in order \u00b7 Esc or Done to finish"
      : this.mode==="services"
      ? "utilities: drag nodes \u00b7 add collector/panel, then Wire all \u00b7 Esc to finish"
      : this.mode==="sounding"
      ? "room: drag corners and features \u00b7 add via the panel \u00b7 Esc to finish"
      : "drag to move \u00b7 R rotate \u00b7 M mirror \u00b7 Del remove";
  }
};

/* ---- tests ---- */
const Tests = {
  results:[], ok(n,c,d=""){this.results.push({name:n,pass:!!c,detail:d});},
  approx(a,b,e=1e-6){return Math.abs(a-b)<=e;},
  run(){
    const R=this.results; R.length=0; const lib=SEED.library;
    this.ok("seed: library non-empty",lib.length>0,lib.length+" machines");
    let schemaOK=true,badFp=0,sev=new Set(),shapes=new Set();
    for(const m of lib){ if(!m.id||!m.name||!m.category||!m.footprint||!Array.isArray(m.clearances))schemaOK=false;
      if(!m.footprint||m.footprint.vertices.length!==4)badFp++;
      for(const z of m.clearances){sev.add(z.severity);shapes.add(z.shape);} }
    this.ok("seed: required fields",schemaOK);
    this.ok("seed: 4-vertex footprints",badFp===0,badFp+" bad");
    this.ok("seed: hard/soft/shared present",sev.has("hard")&&sev.has("soft")&&sev.has("shared"),[...sev].join(","));
    this.ok("seed: arc primitive present",shapes.has("arc"));
    const saw=lib.find(m=>m.id==="builtin-table-saw-cabinet"); const b=G.bounds(saw.footprint);
    this.ok("bounds: offset anchor",b.minX===-14&&b.maxX===30&&b.minY===-13&&b.maxY===14,JSON.stringify(b));
    const rb={minX:-10,minY:-10,maxX:10,maxY:10};
    this.ok("rectOffEdge: front below minY",G.rectOffEdge(rb,"front",5).some(p=>p[1]===-15));
    this.ok("rectOffEdge: right beyond maxX",G.rectOffEdge(rb,"right",5).some(p=>p[0]===15));
    const sq=[[0,0],[10,0],[10,10],[0,10]];
    this.ok("pointInPolygon: in",G.pointInPolygon([5,5],sq));
    this.ok("pointInPolygon: out",!G.pointInPolygon([15,5],sq));
    this.ok("bearing: +x=90",this.approx(G.bearing(0,0,1,0),90));
    this.ok("bearing: -y=180",this.approx(G.bearing(0,0,0,-1),180));
    const lathe=lib.find(m=>m.id==="builtin-wood-lathe"); const swing=lathe.clearances.find(z=>z.shape==="arc").geometry;
    this.ok("pointInArc: front-left inside",G.pointInArc([-7,-7],swing),"bearing "+G.bearing(0,0,-7,-7).toFixed(0));
    this.ok("pointInArc: front-right outside",!G.pointInArc([7,-7],swing));
    this.ok("pointInArc: beyond radius",!G.pointInArc([-20,-20],swing));
    const ma=G.mirrorArc({center:[0,0],radius:20,startAngle:180,sweep:90});
    this.ok("mirrorArc: 180->90",ma.startAngle===90&&ma.sweep===90,ma.startAngle+"/"+ma.sweep);
    this.ok("mirrorArc: catches front-right",G.pointInArc([7,-7],ma)&&!G.pointInArc([-7,-7],ma));
    const w=G.toWorld([0,1],{position:[0,0],rotation:90,mirrored:false});
    this.ok("toWorld: +y rot90 CW -> +x",this.approx(w[0],1)&&this.approx(w[1],0),`(${w[0].toFixed(2)},${w[1].toFixed(2)})`);
    this.ok("toWorld: mirror flips x",(()=>{const m=G.toWorld([1,0],{position:[0,0],rotation:0,mirrored:true});return this.approx(m[0],-1)&&this.approx(m[1],0);})());
    this.ok("segIntersect: crossing",G.segIntersect([0,0],[10,10],[0,10],[10,0]));
    this.ok("segIntersect: parallel none",!G.segIntersect([0,0],[10,0],[0,5],[10,5]));
    this.ok("polysOverlap: overlapping",G.polysOverlap([[0,0],[10,0],[10,10],[0,10]],[[5,5],[15,5],[15,15],[5,15]]));
    this.ok("polysOverlap: disjoint",!G.polysOverlap([[0,0],[4,0],[4,4],[0,4]],[[10,10],[14,10],[14,14],[10,14]]));
    this.ok("polysOverlap: containment",G.polysOverlap([[0,0],[20,0],[20,20],[0,20]],[[8,8],[12,8],[12,12],[8,12]]));
    this.ok("TRIM: footprint x footprint = error",Trim.interaction("footprint","footprint")==="error");
    this.ok("TRIM: hard x footprint = error",Trim.interaction("hard","footprint")==="error");
    this.ok("TRIM: hard x shared = error",Trim.interaction("shared","hard")==="error");
    this.ok("TRIM: soft x soft = warning",Trim.interaction("soft","soft")==="warning");
    this.ok("TRIM: shared x shared = ok",Trim.interaction("shared","shared")==="ok");
    this.ok("TRIM: shared x soft = ok",Trim.interaction("shared","soft")==="ok");
    this.ok("TRIM: hard x soft = warning",Trim.interaction("hard","soft")==="warning");
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-table-saw-cabinet",position:[140,110],rotation:0,mirrored:false},
      {id:"b",defId:"builtin-table-saw-cabinet",position:[150,110],rotation:0,mirrored:false}];
      this.ok("TRIM: overlapping saws report error",Trim.compute(d).errors>0);})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-table-saw-cabinet",position:[5,5],rotation:0,mirrored:false}];
      this.ok("TRIM: out-of-bounds flags error",Trim.compute(d).errors>0);})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-drill-press",position:[144,108],rotation:0,mirrored:false}];
      const c=Trim.compute(d); this.ok("TRIM: lone centered machine clear",c.errors===0&&c.warnings===0);})();
    // TRIM minHeight (vertical bands)
    this.ok("TRIM: low body clears a high feed lane band",!Trim.vOverlap({lo:0,hi:16},{lo:40,hi:108}));
    this.ok("TRIM: tall body intrudes a feed lane band",Trim.vOverlap({lo:0,hi:66},{lo:40,hi:108}));
    this.ok("TRIM: any body meets a full-height operator band",Trim.vOverlap({lo:0,hi:16},{lo:0,hi:108}));
    (()=>{const d=Model.emptyFacility(); d.facility.boundary.vertices=[[0,0],[600,0],[600,600],[0,600]];
      d.scenarios[0].placements=[
        {id:"a",defId:"builtin-table-saw-cabinet",position:[300,260],rotation:0,mirrored:false},
        {id:"b",defId:"builtin-table-saw-cabinet",position:[300,330],rotation:0,mirrored:false}];
      const c=Trim.compute(d);
      this.ok("TRIM: two short saws in line, feed-lane-over-body suppressed by height",c.errors===0&&c.warnings===0,c.errors+"e/"+c.warnings+"w");})();
    (()=>{const d=Model.emptyFacility(); d.facility.boundary.vertices=[[0,0],[600,0],[600,600],[0,600]];
      d.scenarios[0].placements=[
        {id:"a",defId:"builtin-table-saw-cabinet",position:[300,260],rotation:0,mirrored:false},
        {id:"b",defId:"builtin-drill-press",position:[300,330],rotation:0,mirrored:false}];
      const c=Trim.compute(d);
      this.ok("TRIM: a tall drill press in the same feed lane is flagged",c.warnings>=1,c.warnings+" warnings");})();
    // ROUTING
    (()=>{const s=lib.find(m=>m.id==="builtin-table-saw-cabinet");
      this.ok("ROUTING: seed machines carry work points", (s.ports||[]).length>0, (s.ports||[]).length+" ports on saw");})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-jointer-8in",position:[100,100],rotation:0,mirrored:false}];
      const pl=d.scenarios[0].placements[0];
      const near=Flow.nearestPort(d,pl,G.toWorld([36,0],pl)); // near stock_out (right)
      this.ok("ROUTING: nearestPort snaps to closest work point",near==="out",near);})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-jointer-8in",position:[60,100],rotation:0,mirrored:false},
      {id:"b",defId:"builtin-table-saw-cabinet",position:[200,100],rotation:0,mirrored:false}];
      const fl={id:"f",name:"F",waypoints:[{placementId:"a",portId:"out"},{placementId:"b",portId:"in"}],color:"#000"};
      const m=Flow.metrics(d,fl);
      this.ok("ROUTING: metric distance is positive",m.distanceIn>0,m.feet.toFixed(1)+" ft");
      this.ok("ROUTING: straight run has no backtrack",m.backtracks===0);})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-drill-press",position:[60,100],rotation:0,mirrored:false},
      {id:"b",defId:"builtin-drill-press",position:[260,100],rotation:0,mirrored:false},
      {id:"c",defId:"builtin-drill-press",position:[160,100],rotation:0,mirrored:false},
      {id:"e",defId:"builtin-drill-press",position:[360,100],rotation:0,mirrored:false}];
      // net travel is left-to-right; the b->c leg doubles back and should count as a backtrack
      const fl={id:"f",name:"F",color:"#000",waypoints:[{placementId:"a"},{placementId:"b"},{placementId:"c"},{placementId:"e"}]};
      const m=Flow.metrics(d,fl);
      this.ok("ROUTING: a reverse leg counts as backtrack",m.backtracks===1,m.backtracks+" backtracks");})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-jointer-8in",position:[60,60],rotation:0,mirrored:false},
      {id:"b",defId:"builtin-jointer-8in",position:[200,200],rotation:0,mirrored:false},
      {id:"c",defId:"builtin-jointer-8in",position:[60,200],rotation:0,mirrored:false},
      {id:"e",defId:"builtin-jointer-8in",position:[200,60],rotation:0,mirrored:false}];
      d.scenarios[0].flows=[
        {id:"f1",name:"F1",color:"#000",waypoints:[{placementId:"a"},{placementId:"b"}]},
        {id:"f2",name:"F2",color:"#111",waypoints:[{placementId:"c"},{placementId:"e"}]}];
      this.ok("ROUTING: crossing flows are detected",Flow.crossings(d)>0,Flow.crossings(d)+" crossings");})();
    (()=>{const d=Model.emptyFacility(); d.scenarios[0].placements=[
      {id:"a",defId:"builtin-jointer-8in",position:[60,60],rotation:0,mirrored:false},
      {id:"b",defId:"builtin-jointer-8in",position:[200,60],rotation:0,mirrored:false},
      {id:"c",defId:"builtin-jointer-8in",position:[60,200],rotation:0,mirrored:false},
      {id:"e",defId:"builtin-jointer-8in",position:[200,200],rotation:0,mirrored:false}];
      d.scenarios[0].flows=[
        {id:"f1",name:"F1",color:"#000",waypoints:[{placementId:"a"},{placementId:"b"}]},
        {id:"f2",name:"F2",color:"#111",waypoints:[{placementId:"c"},{placementId:"e"}]}];
      this.ok("ROUTING: parallel flows do not cross",Flow.crossings(d)===0);})();
    (()=>{const d=Model.emptyFacility(); const fl=Model.addFlow(d);
      this.ok("ROUTING: addFlow assigns a color and id",!!fl.color&&!!fl.id);})();
    // SERVICES
    this.ok("SERVICES: 90deg elbow equiv scales with diameter",
      Services.elbow90(6)>Services.elbow90(4), Services.elbow90(4)+"->"+Services.elbow90(6)+" ft");
    this.ok("SERVICES: straight duct has no elbow equivalent",
      Services.elbowEquivFt([[0,0],[0,120]],4)===0);
    this.ok("SERVICES: an L-run adds one 90deg elbow equivalent",
      this.approx(Services.elbowEquivFt([[0,0],[120,0],[120,120]],4), Services.elbow90(4)),
      Services.elbowEquivFt([[0,0],[120,0],[120,120]],4).toFixed(1)+" ft");
    (()=>{const d=Model.emptyFacility();
      d.scenarios[0].placements=[{id:"a",defId:"builtin-table-saw-cabinet",position:[60,60],rotation:0,mirrored:false}];
      d.scenarios[0].utilityNodes=[{id:"c",kind:"dust_collector",position:[60,180],spec:{cfm:1200,staticPressure:10},label:"C"}];
      Services.wireAll(d);
      const dust=d.scenarios[0].utilityRuns.filter(r=>r.system==="dust");
      this.ok("SERVICES: wireAll connects a machine with a dust port",dust.length===1,dust.length+" dust runs");})();
    (()=>{const d=Model.emptyFacility();
      // machine far from collector on a 4in run -> effective length exceeds the 35ft budget
      d.scenarios[0].placements=[{id:"a",defId:"builtin-bandsaw-14in",position:[40,40],rotation:0,mirrored:false}];
      d.scenarios[0].utilityNodes=[{id:"c",kind:"dust_collector",position:[560,560],spec:{cfm:1200,staticPressure:10},label:"C"}];
      Services.wireAll(d);
      const rep=Services.dustRunReport(d,d.scenarios[0].utilityRuns.find(r=>r.system==="dust"));
      this.ok("SERVICES: a long 4in dust run trips the budget warning",rep.over,rep.effectiveFt.toFixed(0)+" > "+rep.maxFt+" ft");})();
    (()=>{const d=Model.emptyFacility();
      // 240V machine, but only a 120V panel present -> reachability error
      d.scenarios[0].placements=[{id:"a",defId:"builtin-table-saw-cabinet",position:[100,100],rotation:0,mirrored:false}];
      d.scenarios[0].utilityNodes=[{id:"p",kind:"panel",position:[20,20],spec:{voltage:120,mainAmps:100},label:"P"}];
      Services.wireAll(d);
      this.ok("SERVICES: 240V machine with 120V-only panel errors",Services.compute(d).errors>0);})();
    (()=>{const d=Model.emptyFacility();
      d.scenarios[0].placements=[{id:"a",defId:"builtin-table-saw-cabinet",position:[100,100],rotation:0,mirrored:false}];
      d.scenarios[0].utilityNodes=[{id:"p",kind:"panel",position:[20,20],spec:{voltage:240,mainAmps:100},label:"P"}];
      Services.wireAll(d);
      const s=Services.compute(d);
      this.ok("SERVICES: 240V machine on a 240V panel is clean",s.errors===0&&s.load240>0,s.load240+"A @240V");})();
    // PLAT
    (()=>{const d=Model.emptyFacility();
      d.scenarios[0].placements=[{id:"a",defId:"builtin-drill-press",position:[100,100],rotation:0,mirrored:false}];
      Model.duplicateScenario(d);
      this.ok("PLAT: duplicate makes a second scenario",d.scenarios.length===2);
      d.scenarios[1].placements[0].position=[200,200];
      this.ok("PLAT: scenarios are independent after edit",d.scenarios[0].placements[0].position[0]===100);})();
    (()=>{const d=Model.emptyFacility();
      d.scenarios[0].placements=[
        {id:"a",defId:"builtin-drill-press",position:[100,100],rotation:0,mirrored:false},
        {id:"b",defId:"builtin-jointer-8in",position:[150,150],rotation:0,mirrored:false}];
      Model.duplicateScenario(d);
      const b=d.scenarios[1];
      b.placements.find(p=>p.id==="a").position=[120,100];
      b.placements=b.placements.filter(p=>p.id!=="b");
      b.placements.push({id:"c",defId:"builtin-bandsaw-14in",position:[200,80],rotation:0,mirrored:false});
      const delta=Compare.delta(d,"s1",b.id);
      this.ok("PLAT: delta detects a moved machine",delta.moved.length===1,delta.moved.length+" moved");
      this.ok("PLAT: delta detects a removed machine",delta.removed.length===1);
      this.ok("PLAT: delta detects an added machine",delta.added.length===1);})();
    (()=>{const d=Model.demo();
      const sheet=View.platSVG(d,d.activeScenarioId,{palette:"print",titleBlock:true,legend:true});
      this.ok("PLAT: printable sheet carries title block and scale bar",
        /BAYPLAN FI-075/.test(sheet.svg)&&/2 ft/.test(sheet.svg)&&/REV /.test(sheet.svg));
      this.ok("PLAT: printable sheet carries a legend",/Dust run/.test(sheet.svg)&&/Electrical/.test(sheet.svg));})();
    // SOUNDING
    (()=>{const d=Model.emptyFacility(); Model.setFacilityRect(d,400,300);
      const v=d.facility.boundary.vertices;
      this.ok("SOUNDING: setFacilityRect builds a W by H rectangle",v.length===4&&v[2][0]===400&&v[2][1]===300);
      const i=Model.addBoundaryCorner(d);
      this.ok("SOUNDING: add corner inserts a vertex",d.facility.boundary.vertices.length===5);
      Model.removeBoundaryCorner(d,i);
      this.ok("SOUNDING: remove corner deletes a vertex",d.facility.boundary.vertices.length===4);
      Model.removeBoundaryCorner(d,0); Model.removeBoundaryCorner(d,0);
      this.ok("SOUNDING: cannot drop below three corners",d.facility.boundary.vertices.length>=3);})();
    (()=>{const d=Model.emptyFacility();
      d.scenarios[0].placements=[{id:"a",defId:"builtin-table-saw-cabinet",position:[150,120],rotation:0,mirrored:false}];
      const col=Model.addFeature(d,"column"); col.position=[150,120]; // column on the saw
      this.ok("SOUNDING: a column on a machine is an error",Trim.compute(d).errors>0);
      col.position=[20,20];
      this.ok("SOUNDING: moving the column away clears it",Trim.compute(d).errors===0);})();
    (()=>{const d=Model.emptyFacility();
      d.scenarios[0].placements=[{id:"a",defId:"builtin-drill-press",position:[100,100],rotation:0,mirrored:false}];
      const dr=Model.addFeature(d,"door"); dr.position=[100,80]; dr.width=40; dr.swingStart=270; dr.swingSweep=90;
      this.ok("SOUNDING: a door swing over a machine is flagged",Trim.compute(d).errors>0||Trim.compute(d).warnings>0);
      dr.position=[20,220];
      const c=Trim.compute(d); this.ok("SOUNDING: moving the door away clears it",c.errors===0&&c.warnings===0);})();
    (()=>{const d=Model.emptyFacility();
      d.scenarios[0].placements=[{id:"a",defId:"builtin-table-saw-cabinet",position:[150,120],rotation:0,mirrored:false}];
      Model.addFeature(d,"window"); d.facility.features[0].position=[150,120];
      this.ok("SOUNDING: a window does not constrain placement",Trim.compute(d).errors===0&&Trim.compute(d).warnings===0);})();
    this.paint();
  },
  paint(){
    const pass=this.results.filter(r=>r.pass).length,total=this.results.length;
    const rows=this.results.map(r=>`<tr><td class="${r.pass?'t-pass':'t-fail'}">${r.pass?'PASS':'FAIL'}</td><td>${r.name}</td><td style="color:var(--ink-dim)">${r.detail||""}</td></tr>`).join("");
    document.getElementById("app").innerHTML=`<div id="tests">
      <h1>BAYPLAN \u00b7 full-arc test harness (SOUNDING \u00b7 TRIM \u00b7 ROUTING \u00b7 SERVICES \u00b7 PLAT)</h1>
      <div class="summary ${pass===total?'t-pass':'t-fail'}">${pass} / ${total} passing${pass===total?"  \u00b7 release gate green":"  \u00b7 gate RED"}</div>
      <table><tbody>${rows}</tbody></table>
      <p style="margin-top:18px"><a href="#" onclick="location.hash='';location.reload()">\u2190 back to plat</a></p></div>`;
    document.documentElement.setAttribute("data-theme","night");
  }
};

window.addEventListener("DOMContentLoaded",()=>UI.boot());
window.addEventListener("hashchange",()=>location.reload());
</script>
</body>
</html>
